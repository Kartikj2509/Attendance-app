<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kartik ❤️ Tara</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  min-height:100vh;
  padding:20px 0;
}

.container{
  width:90%;
  max-width:420px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  text-align:center;
}

button{
  margin:5px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.present{background:#2ecc71;color:white;}
.bunk{background:#e74c3c;color:white;}
.switch{background:#3498db;color:white;}
.track{background:#8e44ad;color:white;}
.tt{background:#f39c12;color:white;}

.card{
  background:rgba(255,255,255,0.1);
  padding:12px;
  margin:10px 0;
  border-radius:12px;
}

/* 📱 Mobile */
@media (max-width:600px){
  .container{width:95%;padding:15px;}
  h2{font-size:20px;}
  h3{font-size:16px;}
}
</style>
</head>

<body>
<div class="container">
  <h2 id="name">Kartik</h2>
  <h3 id="overall"></h3>
  <h4 id="nextClass"></h4>

  <button class="switch" onclick="switchUser()">Switch ❤️</button>
  <button class="track" onclick="toggleMode()">Tracker 📊</button>
  <button class="tt" onclick="toggleTT()">Timetable 📅</button>

  <div id="content">⏳ Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3R5plHfBl1VU2MOenTYIZJEKRQ0iIcZQ",
  authDomain: "attendance-ea8db.firebaseapp.com",
  projectId: "attendance-ea8db",
  storageBucket: "attendance-ea8db.firebasestorage.app",
  messagingSenderId: "892923950327",
  appId: "1:892923950327:web:4b432caad184d0b5280ff2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser="kartik";
let data=null;
let mode="all";
let timetableMode=false;

const timetable={
Monday:[
{sub:"DBMS",time:"8:00"},
{sub:"Java",time:"8:50"},
{sub:"ANN",time:"10:30"},
{sub:"DBMS Lab",time:"11:20"}
],
Tuesday:[
{sub:"Java Lab",time:"9:40"},
{sub:"Life Skills",time:"12:05"}
],
Wednesday:[
{sub:"DBMS",time:"11:20"},
{sub:"COD",time:"12:05"}
],
Thursday:[
{sub:"ANN",time:"8:00"},
{sub:"COD",time:"11:20"},
{sub:"Java",time:"12:05"}
],
Friday:[
{sub:"COD",time:"9:40"}
]
};

window.switchUser = function(){
  currentUser=currentUser==="kartik"?"tara":"kartik";
  document.getElementById("name").innerText=currentUser==="kartik"?"Kartik":"Tara";
  render();
}

window.toggleMode = function(){
  mode=mode==="today"?"all":"today";
  render();
}

window.toggleTT = function(){
  timetableMode=!timetableMode;
  render();
}

window.mark = async function(sub,type){
  let d=data[currentUser][sub];
  d.t++;
  if(type==="present") d.p++;
  await setDoc(doc(db,"attendance","shared"),data);
  render();
}

function overall(){
  let u=data[currentUser];
  let p=0,t=0;

  Object.values(u).forEach(s=>{
    p+=s.p;
    t+=s.t;
  });

  return ((p/t)*100).toFixed(2);
}

function calcBunk(p,t){
  let max = Math.floor((p/0.75) - t);
  return max>0 ? max : 0;
}

function neededFor75(p,t){
  let x = Math.ceil((0.75*t - p)/0.25);
  return x>0 ? x : 0;
}

function render(){

  if(!data) return;

  document.getElementById("overall").innerText="📊 "+overall()+"%";
  document.getElementById("nextClass").innerText="📘 Smart Tracker";

  let c=document.getElementById("content");
  c.innerHTML="";

  if(timetableMode){
    Object.keys(timetable).forEach(day=>{
      c.innerHTML+=`<h3>${day}</h3>`;
      timetable[day].forEach(i=>{
        c.innerHTML+=`<div class="card">${i.sub}<br>${i.time}</div>`;
      });
    });
    return;
  }

  let days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  let today=days[new Date().getDay()];
  let show = mode==="today" ? [today] : Object.keys(timetable);

  show.forEach(day=>{
    if(!timetable[day]) return;

    c.innerHTML+=`<h3>${day}</h3>`;

    timetable[day].forEach(i=>{
      let d=data[currentUser][i.sub];
      if(!d) return;

      let per=((d.p/d.t)*100).toFixed(2);

      let status="",color="";
      if(per<75){status="⚠️ Low";color="red";}
      else if(per<85){status="⚡ Careful";color="orange";}
      else{status="✅ Safe";color="lightgreen";}

      let bunk=calcBunk(d.p,d.t);
      let need=neededFor75(d.p,d.t);

      c.innerHTML+=`
      <div class="card">
      <b>${i.sub}</b><br>
      ${i.time}<br>
      ${per}% (${d.p}/${d.t})<br>

      <div style="color:${color}">${status}</div>
      <div>😎 Can bunk: ${bunk}</div>
      <div>📈 Need for 75%: ${need}</div>

      <button class="present" onclick="mark('${i.sub}','present')">Present</button>
      <button class="bunk" onclick="mark('${i.sub}','bunk')">Bunk</button>
      </div>`;
    });
  });
}

async function loadData(){
  const ref = doc(db,"attendance","shared");
  const snap = await getDoc(ref);

  if(snap.exists()){
    data = snap.data();
    render();
  } else {
    document.getElementById("content").innerHTML="❌ No data";
  }
}

loadData();
</script>
</body>
</html>
