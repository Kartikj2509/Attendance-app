<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kartik ❤️ Tara</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.wrapper{
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:900px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

.top{
  text-align:center;
}

button{
  margin:5px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.present{background:#2ecc71;}
.bunk{background:#e74c3c;}
.switch{background:#3498db;}
.track{background:#8e44ad;}
.tt{background:#f39c12;}

.card{
  background:rgba(255,255,255,0.1);
  padding:12px;
  margin:10px 0;
  border-radius:12px;
}

.bar{
  height:6px;
  border-radius:5px;
  margin:5px 0;
}

@media(max-width:600px){
  .container{padding:15px;}
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="top">
<h2 id="name">Kartik</h2>
<h3 id="overall"></h3>
<h4 id="nextClass"></h4>

<button class="switch" onclick="switchUser()">Switch ❤️</button>
<button class="track" onclick="toggleMode()">Tracker 📊</button>
<button class="tt" onclick="toggleTT()">Timetable 📅</button>
</div>

<div id="content">Loading...</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyA3R5plHfBl1VU2MOenTYIZJEKRQ0iIcZQ",
  authDomain:"attendance-ea8db.firebaseapp.com",
  projectId:"attendance-ea8db"
});

const db=getFirestore(app);

let currentUser="kartik";
let data=null;
let mode="all";
let timetableMode=false;

/* ✅ FULL TIMETABLE WITH ROOMS */
const timetable={
Monday:[
{sub:"DBMS",time:"8:00",room:"VIB 502"},
{sub:"Java",time:"8:50",room:"VIB 502"},
{sub:"ANN",time:"10:30",room:"VIB 207"},
{sub:"DBMS Lab",time:"11:20",room:"VIB 411"}
],
Tuesday:[
{sub:"Java Lab",time:"9:40",room:"VIB 412"},
{sub:"Life Skills",time:"12:05",room:"NYB 005"}
],
Wednesday:[
{sub:"DBMS",time:"11:20",room:"NYB 312"},
{sub:"COD",time:"12:05",room:"NYB 312"}
],
Thursday:[
{sub:"ANN",time:"8:00",room:"KAB 306"},
{sub:"COD",time:"11:20",room:"NYB 312"},
{sub:"Java",time:"12:05",room:"VIB 016"}
],
Friday:[
{sub:"COD",time:"9:40",room:"VIB 307"},
{sub:"ANN Lab",time:"11:20",room:"VIB 412"}
],
Saturday:[
{sub:"Java",time:"10:00",room:"VIB 103"},
{sub:"DBMS",time:"11:00",room:"NYB 001"}
]
};

/* 🔘 BUTTONS */
window.switchUser=function(){
  currentUser=currentUser==="kartik"?"tara":"kartik";
  document.getElementById("name").innerText=currentUser==="kartik"?"Kartik":"Tara";
  render();
}

window.toggleMode=function(){
  mode=mode==="today"?"all":"today";
  render();
}

window.toggleTT=function(){
  timetableMode=!timetableMode;
  document.querySelector(".tt").innerText=
    timetableMode ? "Back 📊" : "Timetable 📅";
  render();
}

window.mark=async function(sub,type){
  let d=data[currentUser][sub]||{p:0,t:0};
  d.t++;
  if(type==="present") d.p++;
  data[currentUser][sub]=d;

  await setDoc(doc(db,"attendance","shared"),data);
  render();
}

/* ⏭️ NEXT CLASS */
function getNextClass(){
  let now=new Date();
  let h=now.getHours()+now.getMinutes()/60;

  let today=new Date().toLocaleString('en-US',{weekday:'long'});
  let list=timetable[today]||[];

  for(let c of list){
    let t=parseFloat(c.time);
    if(t>h) return `⏭️ ${c.sub} (${c.room})`;
  }
  return "🎉 No more classes";
}

/* 📊 CALCULATIONS */
function overall(){
  let u=data[currentUser];
  let p=0,t=0;
  Object.values(u).forEach(s=>{p+=s.p;t+=s.t});
  return ((p/t)*100).toFixed(2);
}

function calcBunk(p,t){
  let x=Math.floor((p/0.75)-t);
  return x>0?x:0;
}

function need75(p,t){
  let x=Math.ceil((0.75*t-p)/0.25);
  return x>0?x:0;
}

/* 🎨 RENDER */
function render(){

if(!data) return;

document.getElementById("overall").innerText="📊 "+overall()+"%";
document.getElementById("nextClass").innerText=getNextClass();

let c=document.getElementById("content");
c.innerHTML="";

/* 📅 TIMETABLE MODE */
if(timetableMode){
  Object.keys(timetable).forEach(day=>{
    c.innerHTML+=`<h3>${day}</h3>`;
    timetable[day].forEach(i=>{
      c.innerHTML+=`
      <div class="card">
      <b>${i.sub}</b><br>
      ${i.time}<br>
      📍 ${i.room}
      </div>`;
    });
  });
  return;
}

/* NORMAL MODE */
let today=new Date().toLocaleString('en-US',{weekday:'long'});
let show=mode==="today" ? [today] : Object.keys(timetable);

show.forEach(day=>{
  if(!timetable[day]) return;

  c.innerHTML+=`<h3>${day}</h3>`;

  timetable[day].forEach(i=>{
    let d=data[currentUser][i.sub]||{p:0,t:0};
    let per=d.t?((d.p/d.t)*100).toFixed(1):0;

    let color=per<75?"red":per<85?"orange":"lightgreen";
    let status=per<75?"⚠️ Low":per<85?"⚡ Careful":"✅ Safe";

    c.innerHTML+=`
    <div class="card">
    <b>${i.sub}</b><br>
    ${i.time}<br>
    📍 ${i.room}<br>
    ${per}% (${d.p}/${d.t})<br>

    <div class="bar" style="background:${color};width:${per}%"></div>
    <div style="color:${color}">${status}</div>

    <div>😎 Can bunk: ${calcBunk(d.p,d.t)}</div>
    <div>📈 Need for 75%: ${need75(d.p,d.t)}</div>

    <button class="present" onclick="mark('${i.sub}','present')">Present</button>
    <button class="bunk" onclick="mark('${i.sub}','bunk')">Bunk</button>
    </div>`;
  });
});

}

/* 🔄 LOAD DATA */
async function load(){
  let snap=await getDoc(doc(db,"attendance","shared"));
  if(snap.exists()){
    data=snap.data();
    render();
  }
}

load();
</script>

</body>
</html>
