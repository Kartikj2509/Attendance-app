<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance Tracker</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.wrapper{
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:900px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

.top{text-align:center;}

button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  flex:1;
}

.present{background:#2ecc71;}
.bunk{background:#e74c3c;}
.switch{background:#3498db;}
.track{background:#8e44ad;}
.tt{background:#f39c12;}

.card{
  background:rgba(255,255,255,0.1);
  padding:12px;
  margin:10px 0;
  border-radius:12px;
}

/* BLUR STATES */
.done-present{
  background: rgba(46,204,113,0.25);
  backdrop-filter: blur(6px);
}
.done-bunk{
  background: rgba(231,76,60,0.25);
  backdrop-filter: blur(6px);
}

@media(max-width:600px){
  .container{padding:15px;}
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="top">
<h2 id="name">Kartik</h2>
<h3 id="overall"></h3>

<button class="switch" onclick="switchUser()">Switch ❤️</button>
<button class="track" onclick="toggleMode()">Tracker 📊</button>
<button class="tt" onclick="toggleTT()">Timetable 📅</button>
</div>

<div id="content">Loading...</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyA3R5plHfBl1VU2MOenTYIZJEKRQ0iIcZQ",
  authDomain:"attendance-ea8db.firebaseapp.com",
  projectId:"attendance-ea8db"
});

const db=getFirestore(app);

let currentUser="kartik";
let data=null;
let timetableMode=false;

/* UI STATE */
let lastAction={};

/* TIMETABLE */
const timetable={
Monday:[
{sub:"DBMS",time:"8:00",room:"VIB 502"},
{sub:"Java",time:"8:50",room:"VIB 502"},
{sub:"ANN",time:"10:30",room:"VIB 207"},
{sub:"DBMS Lab",time:"11:20",room:"VIB 411"}
],
Tuesday:[
{sub:"Java Lab",time:"9:40",room:"VIB 412"},
{sub:"Life Skills",time:"12:05",room:"NYB 005"}
],
Wednesday:[
{sub:"DBMS",time:"11:20",room:"NYB 312"},
{sub:"COD",time:"12:05",room:"NYB 312"}
],
Thursday:[
{sub:"ANN",time:"8:00",room:"KAB 306"},
{sub:"COD",time:"11:20",room:"NYB 312"},
{sub:"Java",time:"12:05",room:"VIB 016"}
],
Friday:[
{sub:"COD",time:"8:00",room:"VIB 307"},
{sub:"Life Skills",time:"8:50",room:"VIB 013"},
{sub:"DBMS",time:"9:40",room:"NYB 312"},
{sub:"ANN",time:"11:20",room:"NYB 312"},
{sub:"Java",time:"12:05",room:"VIB 103"}
],
Saturday:[
{sub:"ANN Lab",time:"8:00",room:"VIB 412"},
{sub:"DBMS",time:"9:40",room:"NYB 001"}
]
};


/* BUTTONS */
window.switchUser=function(){
  currentUser=currentUser==="kartik"?"tara":"kartik";
  document.getElementById("name").innerText=currentUser==="kartik"?"Kartik":"Tara";
  render();
}

window.toggleMode=function(){
  timetableMode=false;
  render();
}

window.toggleTT=function(){
  timetableMode=!timetableMode;
  render();
}

/* ACTIONS */
window.mark=async function(sub,type){
  let d=data[currentUser][sub]||{p:0,t:0};
  d.t++;
  if(type==="present") d.p++;

  data[currentUser][sub]=d;
  lastAction[sub]=type;

  await setDoc(doc(db,"attendance","shared"),data);
  render();
}

window.undo=async function(sub){
  let d=data[currentUser][sub];
  if(!d) return;

  if(d.t>0) d.t--;
  if(d.p>d.t) d.p=d.t;

  delete lastAction[sub];

  await setDoc(doc(db,"attendance","shared"),data);
  render();
}

/* CALCULATIONS */
function overall(){
  let u=data[currentUser];
  let p=0,t=0;
  Object.values(u).forEach(s=>{p+=s.p;t+=s.t});
  return ((p/t)*100).toFixed(2);
}

function calcBunk(p,t){
  let x=Math.floor((p/0.75)-t);
  return x>0?x:0;
}

function need75(p,t){
  let x=Math.ceil((0.75*t-p)/0.25);
  return x>0?x:0;
}

/* RENDER */
function render(){

if(!data) return;

document.getElementById("overall").innerText="📊 "+overall()+"%";

let c=document.getElementById("content");
c.innerHTML="";

/* TIMETABLE MODE */
if(timetableMode){
  Object.keys(timetable).forEach(day=>{
    c.innerHTML+=`<h3>${day}</h3>`;
    timetable[day].forEach(i=>{
      c.innerHTML+=`
      <div class="card">
      ${i.sub}<br>
⏰ ${i.time}<br>
📍 ${i.room}
      </div>`;
    });
  });
  return;
}

/* TRACKER (NO DAYS) */
let subjects={};

Object.keys(timetable).forEach(day=>{
  timetable[day].forEach(i=>{
    subjects[i.sub]=i;
  });
});

Object.values(subjects).forEach(i=>{
  let d=data[currentUser][i.sub]||{p:0,t:0};
  let per=d.t?((d.p/d.t)*100).toFixed(1):0;

  let cls="card";
  if(lastAction[i.sub]==="present") cls+=" done-present";
  if(lastAction[i.sub]==="bunk") cls+=" done-bunk";

  c.innerHTML+=`
  <div class="${cls}">
  <b>${i.sub}</b><br>
  📍 ${i.room}<br>
  ${per}% (${d.p}/${d.t})<br>

  <div>😎 Can bunk: ${calcBunk(d.p,d.t)}</div>
  <div>📈 Need for 75%: ${need75(d.p,d.t)}</div>

  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <button class="present" onclick="mark('${i.sub}','present')">➕</button>
    <button class="bunk" onclick="mark('${i.sub}','bunk')">❌</button>
    <button style="background:#555;" onclick="undo('${i.sub}')">➖</button>
  </div>
  </div>`;
});

}

/* LOAD */
async function load(){
  let snap=await getDoc(doc(db,"attendance","shared"));
  if(snap.exists()){
    data=snap.data();
    render();
  }
}

load();
</script>

</body>
</html>
