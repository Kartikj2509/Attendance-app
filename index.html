<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kartik ❤️ Tara</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  width:350px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  text-align:center;
}
button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.present{background:#2ecc71;color:white;}
.bunk{background:#e74c3c;color:white;}
.switch{background:#3498db;color:white;}
.track{background:#8e44ad;color:white;}
.tt{background:#f39c12;color:white;}
.card{
  background:rgba(255,255,255,0.1);
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="container">
  <h2 id="name">Kartik</h2>
  <h3 id="overall"></h3>
  <h4 id="nextClass"></h4>

  <button class="switch" onclick="switchUser()">Switch ❤️</button>
  <button class="track" onclick="toggleMode()">Tracker 📊</button>
  <button class="tt" onclick="toggleTT()">Timetable 📅</button>

  <div id="content">⏳ Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3R5plHfBl1VU2MOenTYIZJEKRQ0iIcZQ",
  authDomain: "attendance-ea8db.firebaseapp.com",
  projectId: "attendance-ea8db",
  storageBucket: "attendance-ea8db.firebasestorage.app",
  messagingSenderId: "892923950327",
  appId: "1:892923950327:web:4b432caad184d0b5280ff2",
  measurementId: "G-DG8E73CTRP"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser="kartik";
let data=null;
let mode="today";
let timetableMode=false;

const timetable={
Monday:[
{sub:"DBMS",time:"8:00",room:"VIB 502"},
{sub:"Java",time:"8:50",room:"VIB 502"},
{sub:"ANN",time:"10:30",room:"VIB 207"}
],
Wednesday:[
{sub:"DBMS",time:"11:20",room:"NYB 312"},
{sub:"COD",time:"12:05",room:"NYB 312"}
]
};

function switchUser(){
currentUser=currentUser==="kartik"?"tara":"kartik";
document.getElementById("name").innerText=currentUser==="kartik"?"Kartik":"Tara";
render();
}

function toggleMode(){
mode=mode==="today"?"all":"today";
render();
}

function toggleTT(){
timetableMode=!timetableMode;
render();
}

function overall(){
let u=data[currentUser];
let p=0,t=0;

Object.values(u).forEach(s=>{
if(s && s.p && s.t){
p+=s.p;
t+=s.t;
}
});

if(t===0) return 0;
return ((p/t)*100).toFixed(2);
}

function getNextClass(){
return "⏭️ DBMS (NYB 312)";
}

async function mark(sub,type){
let d=data[currentUser][sub];
d.t++;
if(type==="present") d.p++;
await setDoc(doc(db,"attendance","shared"),data);
render();
}

function render(){

if(!data || !data[currentUser]){
document.getElementById("content").innerHTML="⏳ Loading...";
return;
}

document.getElementById("overall").innerText="📊 "+overall()+"%";
document.getElementById("nextClass").innerText=getNextClass();

let c=document.getElementById("content");
c.innerHTML="";

if(timetableMode){
Object.keys(timetable).forEach(day=>{
c.innerHTML+=`<h3>${day}</h3>`;
timetable[day].forEach(i=>{
c.innerHTML+=`<div class="card">${i.sub}<br>${i.time}<br>${i.room}</div>`;
});
});
return;
}

let days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
let today=days[new Date().getDay()];
let show=mode==="today"?[today]:Object.keys(timetable);

show.forEach(day=>{
if(!timetable[day]) return;

c.innerHTML+=`<h3>${day}</h3>`;
timetable[day].forEach(i=>{
let d=data[currentUser][i.sub];
if(!d) return;

let per=((d.p/d.t)*100).toFixed(2);

c.innerHTML+=`
<div class="card">
<b>${i.sub}</b><br>
${i.time}<br>
${per}% (${d.p}/${d.t})<br>
<button class="present" onclick="mark('${i.sub}','present')">Present</button>
<button class="bunk" onclick="mark('${i.sub}','bunk')">Bunk</button>
</div>`;
});
});

}

async function loadData(){
try{
const snap=await getDoc(doc(db,"attendance","shared"));
if(snap.exists()){
data=snap.data();
}else{
document.getElementById("content").innerHTML="❌ No data";
return;
}
render();
}catch(e){
console.error(e);
document.getElementById("content").innerHTML="❌ Error";
}
}

// 🔥 MAKE FUNCTIONS GLOBAL (CRITICAL FIX)
window.mark = mark;
window.switchUser = switchUser;
window.toggleMode = toggleMode;
window.toggleTT = toggleTT;

// 🔥 LOAD ONLY (NO RESET)
loadData();
</script>
</body>
</html>
