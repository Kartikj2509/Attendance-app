<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Attendance Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" sizes="180x180" href="icon2.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            glass: 'rgba(255, 255, 255, 0.05)',
          },
          animation: {
            'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'fade-in': 'fadeIn 0.2s ease-out forwards',
          },
          keyframes: {
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background: linear-gradient(135deg, #020617, #0f172a, #1e1b4b);
      color: white;
      -webkit-tap-highlight-color: transparent;
    }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    .btn-active:active { transform: scale(0.95); }
    
    /* Toggles */
    .toggle-checkbox:checked { right: 0; border-color: #34d399; }
    .toggle-checkbox:checked + .toggle-label { background-color: #34d399; }
    
    /* Status Colors */
    .status-present { background: linear-gradient(145deg, rgba(16, 185, 129, 0.1), rgba(255,255,255,0.02)); border-color: rgba(16, 185, 129, 0.2); }
    .status-bunk { background: linear-gradient(145deg, rgba(244, 63, 94, 0.1), rgba(255,255,255,0.02)); border-color: rgba(244, 63, 94, 0.2); }
    .status-cancelled { background: linear-gradient(145deg, rgba(148, 163, 184, 0.1), rgba(255,255,255,0.02)); border-color: rgba(148, 163, 184, 0.2); }
  </style>
</head>

<body class="flex justify-center h-screen overflow-hidden selection:bg-indigo-500/30 antialiased relative">

  <div class="w-full max-w-md h-full flex flex-col relative bg-slate-950/50 shadow-2xl ring-1 ring-white/5">
    
    <header class="pt-10 pb-4 px-6 glass-card rounded-b-3xl z-20 sticky top-0 flex justify-between items-center">
      <div>
        <p class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-1">Dashboard</p>
        <button onclick="switchUser()" class="btn-active group flex items-center gap-2 text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-300">
          <span id="name">Kartik</span>
          <i class="fa-solid fa-arrows-rotate text-sm text-indigo-400 group-hover:rotate-180 transition-transform duration-500"></i>
        </button>
      </div>
      <div class="text-right flex items-center gap-3">
        <div>
          <p class="text-slate-400 text-xs font-medium uppercase tracking-wider mb-1">Overall</p>
          <div id="overall" class="text-xl font-bold text-emerald-400">--%</div>
        </div>
        <button onclick="openSettings()" class="btn-active w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-slate-300 hover:text-white">
          <i class="fa-solid fa-gear"></i>
        </button>
      </div>
    </header>

    <main id="content" class="flex-1 overflow-y-auto px-5 pt-6 pb-28 space-y-4 relative z-10 scroll-smooth">
      <div class="flex h-full items-center justify-center animate-pulse">
        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-indigo-500"></i>
      </div>
    </main>

    <nav class="absolute bottom-0 w-full px-4 pb-8 pt-4 glass-card rounded-t-3xl z-20 flex justify-between items-center">
      <button onclick="switchTab('today')" id="tab-today" class="btn-active flex flex-col items-center gap-1 text-indigo-400 w-14">
        <i class="fa-solid fa-bolt text-xl mb-1"></i><span class="text-[10px] font-bold">Today</span>
      </button>
      <button onclick="switchTab('tracker')" id="tab-tracker" class="btn-active flex flex-col items-center gap-1 text-slate-500 w-14">
        <i class="fa-solid fa-chart-pie text-xl mb-1"></i><span class="text-[10px] font-bold">Tracker</span>
      </button>
      <button onclick="switchTab('history')" id="tab-history" class="btn-active flex flex-col items-center gap-1 text-slate-500 w-14">
        <i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i><span class="text-[10px] font-bold">History</span>
      </button>
      <button onclick="switchTab('timetable')" id="tab-timetable" class="btn-active flex flex-col items-center gap-1 text-slate-500 w-14">
        <i class="fa-solid fa-calendar-days text-xl mb-1"></i><span class="text-[10px] font-bold">Schedule</span>
      </button>
    </nav>
  </div>

  <div id="settings-modal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex items-center justify-center px-4 animate-fade-in">
    <div class="glass-card w-full max-w-sm rounded-3xl p-6 shadow-2xl border border-white/10">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold text-white">Settings</h3>
        <button onclick="closeSettings()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>

      <div class="mb-6 border-b border-white/10 pb-6">
        <p class="text-sm text-slate-400 mb-4">Minimum required attendance:</p>
        <div class="flex items-center gap-4">
          <input type="range" id="target-slider" min="50" max="100" class="w-full accent-indigo-500" oninput="document.getElementById('target-display').innerText = this.value + '%'">
          <span id="target-display" class="text-xl font-bold text-indigo-400 w-16 text-right">75%</span>
        </div>
      </div>

      <div class="mb-6 flex justify-between items-center border-b border-white/10 pb-6">
        <div>
          <p class="text-white font-bold">Holiday Mode</p>
          <p class="text-xs text-slate-400">Pauses today's schedule</p>
        </div>
        <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
            <input type="checkbox" name="toggle" id="holiday-toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300"/>
            <label for="holiday-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-600 cursor-pointer transition-all duration-300"></label>
        </div>
      </div>
      
      <div class="mb-6">
        <button onclick="requestNotifications()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600/50 py-3 rounded-xl transition-all flex justify-center items-center gap-2">
          <i class="fa-regular fa-bell"></i> Enable Class Reminders
        </button>
      </div>

      <button onclick="saveSettings()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-xl transition-colors">
        Save Changes
      </button>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, initializeFirestore, persistentLocalCache } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyA3R5plHfBl1VU2MOenTYIZJEKRQ0iIcZQ",
  authDomain: "attendance-ea8db.firebaseapp.com",
  projectId: "attendance-ea8db"
});

const db = initializeFirestore(app, { localCache: persistentLocalCache() });

let currentUser = "kartik";
let data = null;
let currentTab = 'today'; 
let myChart = null; 

const timetable = {
  Monday: [{sub: "DBMS", time: "8:00", room: "VIB 502"}, {sub: "Java", time: "8:50", room: "VIB 502"}, {sub: "ANN", time: "10:30", room: "VIB 207"}, {sub: "DBMS Lab", time: "11:20", room: "VIB 411"}],
  Tuesday: [{sub: "Java Lab", time: "9:40", room: "VIB 412"}, {sub: "Life Skills", time: "12:05", room: "NYB 005"}],
  Wednesday: [{sub: "DBMS", time: "11:20", room: "NYB 312"}, {sub: "COD", time: "12:05", room: "NYB 312"}],
  Thursday: [{sub: "ANN", time: "8:00", room: "KAB 306"}, {sub: "COD", time: "11:20", room: "NYB 312"}, {sub: "Java", time: "12:05", room: "VIB 016"}],
  Friday: [{sub: "COD", time: "8:00", room: "VIB 307"}, {sub: "Life Skills", time: "8:50", room: "VIB 013"}, {sub: "DBMS", time: "9:40", room: "NYB 312"}, {sub: "ANN", time: "11:20", room: "NYB 312"}, {sub: "Java", time: "12:05", room: "VIB 103"}],
  Saturday: [{sub: "ANN Lab", time: "8:00", room: "VIB 412"}, {sub: "DBMS", time: "9:40", room: "NYB 001"}],
  Sunday: []
};

window.switchUser = function() {
  currentUser = currentUser === "kartik" ? "tara" : "kartik";
  document.getElementById("name").innerText = currentUser === "kartik" ? "Kartik" : "Tara";
  render();
}

window.switchTab = function(tab) {
  currentTab = tab;
  ['today', 'tracker', 'history', 'timetable'].forEach(t => {
    const el = document.getElementById(`tab-${t}`);
    if(t === tab) el.classList.replace('text-slate-500', 'text-indigo-400');
    else el.classList.replace('text-indigo-400', 'text-slate-500');
  });
  render();
}

/* Settings Logic */
window.openSettings = function() {
  document.getElementById('target-slider').value = data[currentUser].target || 75;
  document.getElementById('target-display').innerText = `${data[currentUser].target || 75}%`;
  document.getElementById('holiday-toggle').checked = data[currentUser].holidayMode || false;
  document.getElementById('settings-modal').classList.remove('hidden');
}

window.closeSettings = function() { document.getElementById('settings-modal').classList.add('hidden'); }

window.saveSettings = async function() {
  data[currentUser].target = parseInt(document.getElementById('target-slider').value);
  data[currentUser].holidayMode = document.getElementById('holiday-toggle').checked;
  closeSettings();
  render();
  await setDoc(doc(db, "attendance", "shared"), data);
}

/* Notification Logic */
window.requestNotifications = function() {
  if (!("Notification" in window)) {
    alert("This browser does not support desktop notification");
  } else if (Notification.permission === "granted") {
    new Notification("Reminders are already enabled!");
  } else if (Notification.permission !== "denied") {
    Notification.requestPermission().then(permission => {
      if (permission === "granted") new Notification("Awesome! We'll remind you about classes.");
    });
  }
}

// Background checker for classes (runs every minute while app is open)
setInterval(() => {
  if(Notification.permission !== "granted" || data[currentUser].holidayMode) return;
  const now = new Date();
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const todayClasses = timetable[days[now.getDay()]];
  
  todayClasses.forEach(cls => {
    let [hours, mins] = cls.time.split(':').map(Number);
    let classTime = new Date();
    classTime.setHours(hours, mins, 0);
    
    // Check if class is exactly 10 mins away
    let diffMins = (classTime - now) / 1000 / 60;
    if(diffMins > 9 && diffMins <= 10) {
      new Notification(`Upcoming Class: ${cls.sub}`, {
        body: `Starts in 10 mins at ${cls.room}`,
        icon: '/icon2.png'
      });
    }
  });
}, 60000);

/* Marking Logic (Updated for History Log) */
window.mark = async function(sub, type) {
  let d = data[currentUser][sub] || {p: 0, t: 0, history: []};

  // Build a timeline object. Fallback for old strings.
  let actionObj = { type: type, date: new Date().getTime() };

  if(type === "cancelled") {
    if(!d.history) d.history = [];
    d.history.push(actionObj);
  } else {
    d.t++;
    if(type === "present") d.p++;
    if(!d.history) d.history = [];
    d.history.push(actionObj);
  }

  data[currentUser][sub] = d;
  render(); 
  await setDoc(doc(db, "attendance", "shared"), data);
}

window.undo = async function(sub) {
  let d = data[currentUser][sub];
  if(!d || !d.history || d.history.length === 0) return;

  let last = d.history.pop();
  let lastType = typeof last === 'string' ? last : last.type; // Backwards compatibility!

  if(lastType === "present") { d.p--; d.t--; }
  else if(lastType === "bunk") { d.t--; }

  render();
  await setDoc(doc(db, "attendance", "shared"), data);
}

/* Math */
function calculateStats(userObj) {
  let p = 0, t = 0;
  Object.keys(userObj).forEach(k => {
    if(k !== 'target' && k !== 'holidayMode') { p += userObj[k].p; t += userObj[k].t; }
  });
  return { p, t, percent: t === 0 ? "0.00" : ((p / t) * 100).toFixed(2) };
}

/* Chart */
function renderChart(stats) {
  const absent = stats.t - stats.p;
  if (myChart) myChart.destroy();
  const ctx = document.getElementById('attendanceChart');
  if(!ctx) return;
  myChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Attended', 'Bunked'],
      datasets: [{ data: [stats.p, absent], backgroundColor: ['#34d399', '#fb7185'], borderWidth: 0 }]
    },
    options: { cutout: '75%', plugins: { legend: { display: false } } }
  });
}

/* UI Rendering */
function render() {
  if(!data) return;
  
  const stats = calculateStats(data[currentUser]);
  const overallEl = document.getElementById("overall");
  overallEl.innerText = `${stats.percent}%`;
  
  let c = document.getElementById("content");
  c.innerHTML = "";
  let delay = 0;

  /* ---- TODAY VIEW (With Holiday Mode) ---- */
  if(currentTab === 'today') {
    if(data[currentUser].holidayMode) {
      c.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center opacity-0 animate-slide-up mt-20">
        <div class="w-24 h-24 bg-indigo-500/20 rounded-full flex items-center justify-center mb-4">
          <i class="fa-solid fa-umbrella-beach text-4xl text-indigo-400"></i>
        </div>
        <h2 class="text-2xl font-bold text-white mb-2">Holiday Mode Active</h2>
        <p class="text-slate-400">Enjoy your break! Disable this in settings when classes resume.</p>
      </div>`;
      return;
    }

    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const todayName = days[new Date().getDay()];
    const todayClasses = timetable[todayName];

    c.innerHTML = `
      <div class="flex items-center justify-between mb-4 mt-2">
        <h2 class="text-2xl font-bold text-white">Your Day</h2>
        <span class="px-3 py-1 bg-indigo-500/20 text-indigo-300 rounded-full text-xs font-bold uppercase tracking-wider">${todayName}</span>
      </div>
    `;

    if(todayClasses.length === 0) {
      c.innerHTML += `<div class="glass-card rounded-3xl p-8 text-center text-slate-400 opacity-0 animate-slide-up"><i class="fa-solid fa-mug-hot text-4xl mb-4 text-indigo-400/50"></i><p>No classes today. Enjoy!</p></div>`;
      return;
    }

    todayClasses.forEach(i => {
      let d = data[currentUser][i.sub] || {p: 0, t: 0, history: []};
      let per = d.t ? ((d.p / d.t) * 100).toFixed(1) : 0;
      let lastItem = d.history?.[d.history.length - 1];
      let lastType = typeof lastItem === 'string' ? lastItem : (lastItem ? lastItem.type : null);
      
      let cardClass = "glass-card rounded-3xl p-5 mb-4 opacity-0 animate-slide-up border-l-4";
      if(lastType === "present") cardClass += " border-l-emerald-500 status-present";
      else if(lastType === "bunk") cardClass += " border-l-rose-500 status-bunk";
      else if(lastType === "cancelled") cardClass += " border-l-slate-400 status-cancelled";
      else cardClass += " border-l-indigo-500";

      c.innerHTML += `
        <div class="${cardClass}" style="animation-delay: ${delay}ms">
          <div class="flex justify-between items-start mb-4">
            <div>
              <h3 class="text-xl font-bold text-white">${i.sub}</h3>
              <p class="text-slate-400 text-sm mt-1"><i class="fa-regular fa-clock text-indigo-400 mr-1"></i> ${i.time} &nbsp;&nbsp; <i class="fa-solid fa-location-dot text-rose-400/80 mr-1"></i> ${i.room}</p>
            </div>
            <div class="bg-white/5 px-2 py-1 rounded-lg text-xs font-bold text-slate-300">${per}%</div>
          </div>
          <div class="grid grid-cols-4 gap-2">
            <button onclick="mark('${i.sub}','present')" class="btn-active bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 py-2 rounded-xl text-lg"><i class="fa-solid fa-check"></i></button>
            <button onclick="mark('${i.sub}','bunk')" class="btn-active bg-rose-500/10 text-rose-400 border border-rose-500/30 py-2 rounded-xl text-lg"><i class="fa-solid fa-xmark"></i></button>
            <button onclick="mark('${i.sub}','cancelled')" class="btn-active bg-slate-500/10 text-slate-400 border border-slate-500/30 py-2 rounded-xl text-lg"><i class="fa-solid fa-ban"></i></button>
            <button onclick="undo('${i.sub}')" class="btn-active bg-slate-800 text-slate-300 border border-slate-600/50 py-2 rounded-xl text-lg"><i class="fa-solid fa-rotate-left"></i></button>
          </div>
        </div>
      `;
      delay += 50;
    });
    return;
  }

  /* ---- TRACKER VIEW (With Partner Widget) ---- */
  if(currentTab === 'tracker') {
    const partner = currentUser === "kartik" ? "tara" : "kartik";
    const partnerStats = calculateStats(data[partner]);
    const isWinning = parseFloat(stats.percent) >= parseFloat(partnerStats.percent);

    // Accountability Partner Widget
    c.innerHTML = `
      <div class="glass-card rounded-2xl p-3 mb-4 flex justify-between items-center opacity-0 animate-slide-up border border-indigo-500/30 bg-gradient-to-r from-indigo-500/10 to-transparent">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-400 font-bold uppercase">${partner[0]}</div>
          <div>
            <p class="text-xs text-slate-400 capitalize">${partner}'s Status</p>
            <p class="text-sm font-bold text-white">${partnerStats.percent}%</p>
          </div>
        </div>
        ${!isWinning ? '<i class="fa-solid fa-crown text-yellow-500 text-xl drop-shadow-[0_0_8px_rgba(234,179,8,0.5)]"></i>' : '<p class="text-xs font-bold text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded">You lead!</p>'}
      </div>
    `;

    // Chart
    c.innerHTML += `
      <div class="glass-card rounded-3xl p-5 mb-6 flex items-center justify-between opacity-0 animate-slide-up">
        <div class="w-24 h-24 relative"><canvas id="attendanceChart"></canvas></div>
        <div class="flex-1 pl-6">
          <p class="text-xs text-slate-400 uppercase font-bold mb-1">Target: ${data[currentUser].target || 75}%</p>
          <p class="text-sm text-slate-300 mb-1"><span class="inline-block w-3 h-3 rounded-full bg-emerald-400 mr-2"></span>${stats.p} Attended</p>
          <p class="text-sm text-slate-300"><span class="inline-block w-3 h-3 rounded-full bg-rose-400 mr-2"></span>${stats.t - stats.p} Bunked</p>
        </div>
      </div>
    `;
    setTimeout(() => renderChart(stats), 50);

    let subjects = {};
    Object.keys(timetable).forEach(day => timetable[day].forEach(i => subjects[i.sub] = i));
    
    Object.values(subjects).forEach(i => {
      let d = data[currentUser][i.sub] || {p: 0, t: 0, history: []};
      let per = d.t ? ((d.p / d.t) * 100).toFixed(1) : 0;
      let targetNum = data[currentUser].target || 75;
      let isDanger = parseFloat(per) < targetNum;
      
      c.innerHTML += `
        <div class="glass-card rounded-3xl p-5 mb-4 opacity-0 animate-slide-up relative">
          <div class="flex justify-between items-end mb-3">
            <h3 class="text-lg font-bold text-white">${i.sub}</h3>
            <div class="text-xl font-black ${isDanger && d.t > 0 ? 'text-rose-400' : 'text-emerald-400'}">${per}%</div>
          </div>
          <div class="w-full bg-slate-800/50 rounded-full h-1.5 mb-3">
            <div class="h-1.5 rounded-full ${isDanger ? 'bg-gradient-to-r from-rose-500 to-pink-500' : 'bg-gradient-to-r from-emerald-400 to-teal-500'} transition-all" style="width: ${per}%"></div>
          </div>
        </div>
      `;
      delay += 50;
    });
    return;
  }

  /* ---- HISTORY TIMELINE ---- */
  if(currentTab === 'history') {
    c.innerHTML = `<h2 class="text-xl font-bold text-white mb-4 mt-2">Recent Activity</h2>`;
    
    let allHistory = [];
    Object.keys(data[currentUser]).forEach(sub => {
      if(sub === 'target' || sub === 'holidayMode') return;
      let hist = data[currentUser][sub].history || [];
      hist.forEach(h => {
        // Handle backwards compatibility for old string data
        if(typeof h === 'string') {
          allHistory.push({ sub: sub, type: h, date: 0 }); // Old data goes to bottom
        } else {
          allHistory.push({ sub: sub, type: h.type, date: h.date });
        }
      });
    });

    // Sort newest first
    allHistory.sort((a, b) => b.date - a.date);

    if(allHistory.length === 0) {
      c.innerHTML += `<div class="text-center text-slate-400 mt-10">No history yet.</div>`;
      return;
    }

    // Render top 50 recent events
    allHistory.slice(0, 50).forEach(item => {
      let icon = item.type === 'present' ? '<i class="fa-solid fa-check text-emerald-400"></i>' : 
                 item.type === 'bunk' ? '<i class="fa-solid fa-xmark text-rose-400"></i>' : 
                 '<i class="fa-solid fa-ban text-slate-400"></i>';
      
      let dateString = item.date === 0 ? "Older Data" : new Date(item.date).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });

      c.innerHTML += `
        <div class="flex items-center gap-4 p-3 border-b border-white/5 opacity-0 animate-slide-up" style="animation-delay: ${delay}ms">
          <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">${icon}</div>
          <div class="flex-1">
            <p class="text-white font-bold">${item.sub}</p>
            <p class="text-xs text-slate-400 capitalize">${item.type} • ${dateString}</p>
          </div>
        </div>
      `;
      delay += 20;
    });
    return;
  }

  /* ---- TIMETABLE VIEW ---- */
  if(currentTab === 'timetable') {
    Object.keys(timetable).forEach(day => {
      if(timetable[day].length === 0) return;
      let dayHtml = `<div class="mb-8 opacity-0 animate-slide-up" style="animation-delay: ${delay}ms">
          <h3 class="text-indigo-300 font-bold text-lg mb-3 ml-1">${day}</h3>
          <div class="space-y-3">`;
      timetable[day].forEach(i => {
        dayHtml += `
          <div class="glass-card rounded-2xl p-4 flex justify-between items-center">
            <div><b class="text-white text-md block">${i.sub}</b><span class="text-slate-400 text-xs">${i.room}</span></div>
            <span class="text-xs font-bold text-indigo-400 bg-indigo-500/10 px-3 py-1.5 rounded-lg">${i.time}</span>
          </div>`;
      });
      dayHtml += `</div></div>`;
      c.innerHTML += dayHtml;
      delay += 50;
    });
  }
}

async function load() {
  try {
    let snap = await getDoc(doc(db, "attendance", "shared"));
    if(snap.exists()) {
      data = snap.data();
      if(!data.kartik) data.kartik = { target: 75, holidayMode: false };
      if(!data.tara) data.tara = { target: 75, holidayMode: false };
      render();
    }
  } catch (error) {
    document.getElementById("content").innerHTML = `<div class="text-center text-rose-400 mt-10">Connection error.</div>`;
  }
}

load();
</script>
</body>
</html>
