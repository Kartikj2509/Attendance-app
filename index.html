<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Attendance Tracker Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F4ECE1">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            beige: { 50: '#FFFCF5', 100: '#F4ECE1', 200: '#E8D8C8', 300: '#D5C0A9' },
            slate: { 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
          },
          animation: {
            'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'swing': 'swing 2s ease-in-out infinite'
          },
          keyframes: {
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            swing: { '0%, 100%': { transform: 'rotate(0deg)' }, '20%': { transform: 'rotate(15deg)' }, '40%': { transform: 'rotate(-10deg)' }, '60%': { transform: 'rotate(5deg)' }, '80%': { transform: 'rotate(-5deg)' } }
          }
        }
      }
    }
  </script>

  <style>
    body { color: #292524; -webkit-tap-highlight-color: transparent; transition: background 0.3s ease, color 0.3s ease; }
    html.light body { background: linear-gradient(135deg, #FFFCF5, #F4ECE1, #E8D8C8); }
    html.dark body { background: linear-gradient(135deg, #020617, #0f172a, #1e293b); color: #f8fafc; }
    .glass-card { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); transition: all 0.3s ease; }
    html.light .glass-card { background: rgba(255, 255, 255, 0.65); border: 1px solid rgba(255, 255, 255, 0.8); }
    html.dark .glass-card { background: rgba(15, 23, 42, 0.65); border: 1px solid rgba(255, 255, 255, 0.05); }
    .btn-active:active { transform: scale(0.95); }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    
    /* Bento Settings Styling */
    .settings-group { background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 24px; padding: 16px; margin-bottom: 16px; }
    html.dark .settings-group { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
    
    .custom-toggle { width: 44px; height: 24px; background: #E8D8C8; border-radius: 20px; position: relative; transition: 0.3s; }
    .custom-toggle div { width: 18px; height: 18px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: 0.3s; }
    input:checked + .custom-toggle { background: #d97706; }
    input:checked + .custom-toggle div { left: 23px; }

    #target-slider { -webkit-appearance: none; height: 6px; background: #E8D8C8; border-radius: 5px; outline: none; }
    #target-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #d97706; border-radius: 50%; cursor: pointer; }
    .target-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(0,0,0,0.1); z-index: 10; }
  </style>
</head>

<body class="flex justify-center h-screen overflow-hidden selection:bg-amber-500/30 antialiased relative">
<div id="toast-container" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 w-[90%] max-w-xs pointer-events-none"></div>

  <div class="w-full max-w-md h-full flex flex-col relative dark:bg-slate-900/50 shadow-2xl ring-1 ring-beige-200 dark:ring-white/5 transition-all">
    
    <header class="pt-10 pb-4 px-6 glass-card rounded-b-3xl z-20 sticky top-0 flex justify-between items-center">
      <div>
        <div class="flex items-center gap-2 mb-1">
          <p class="text-stone-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider">Dashboard</p>
          <div id="streak-badge" class="hidden items-center gap-1 bg-orange-100/80 dark:bg-orange-500/20 border border-orange-200 text-orange-600 px-2 py-0.5 rounded-full text-[10px] font-black shadow-sm">
            <i class="fa-solid fa-fire"></i> <span id="streak-count">0</span>
          </div>
        </div>
        <button onclick="switchUser()" class="btn-active group flex items-center gap-2 text-2xl font-black text-stone-800 dark:text-white">
          <span id="name">Kartik</span>

        </button>
      </div>
      <div class="text-right flex items-center gap-3">
        <div><p class="text-stone-500 text-xs font-semibold uppercase tracking-wider mb-1">Overall</p><div id="overall" class="text-xl font-bold text-emerald-600">--%</div></div>
        <button onclick="openSettings()" class="btn-active w-10 h-10 rounded-full bg-white/80 dark:bg-slate-800 border border-beige-300 dark:border-slate-700 flex items-center justify-center text-stone-500 shadow-sm"><i class="fa-solid fa-gear"></i></button>
      </div>

    <main id="content" class="flex-1 overflow-y-auto px-5 pt-6 pb-28 space-y-4 relative z-10 scroll-smooth">
      <div class="flex h-full items-center justify-center animate-pulse"><i class="fa-solid fa-circle-notch fa-spin text-3xl text-amber-500"></i></div>

    <nav class="absolute bottom-0 w-full px-4 pb-8 pt-4 glass-card rounded-t-3xl z-20 flex justify-between items-center">
      <button onclick="switchTab('today')" id="tab-today" class="btn-active flex flex-col items-center gap-1 text-amber-700 w-14"><i class="fa-solid fa-bolt text-xl mb-1"></i><span class="text-[10px] font-bold tracking-wide">Today</span></button>
      <button onclick="switchTab('tracker')" id="tab-tracker" class="btn-active flex flex-col items-center gap-1 text-stone-400 w-14"><i class="fa-solid fa-chart-pie text-xl mb-1"></i><span class="text-[10px] font-bold tracking-wide">Tracker</span></button>
      <button onclick="switchTab('history')" id="tab-history" class="btn-active flex flex-col items-center gap-1 text-stone-400 w-14"><i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i><span class="text-[10px] font-bold tracking-wide">History</span></button>
      <button onclick="switchTab('timetable')" id="tab-timetable" class="btn-active flex flex-col items-center gap-1 text-stone-400 w-14"><i class="fa-solid fa-calendar-days text-xl mb-1"></i><span class="text-[10px] font-bold tracking-wide">Schedule</span></button>
    </nav>
  </div>

  <div id="settings-modal" class="fixed inset-0 z-50 hidden bg-stone-900/40 dark:bg-black/80 backdrop-blur-md flex items-center justify-center px-4 animate-fade-in">
    <div class="glass-card w-full max-w-sm max-h-[90vh] overflow-y-auto rounded-[32px] p-6 shadow-2xl relative">
      <div class="flex justify-between items-center mb-8 sticky top-0 z-10 py-2">
        <h3 class="text-2xl font-black text-stone-800 dark:text-white tracking-tight">Preferences</h3>
        <button onclick="closeSettings()" class="w-8 h-8 rounded-full bg-stone-100 dark:bg-white/10 flex items-center justify-center text-stone-400 hover:text-stone-800"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <div class="settings-group space-y-4">
        <div class="flex justify-between items-center">

        </div>
        <div class="flex justify-between items-center">
          <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-lg bg-rose-100 dark:bg-rose-500/20 flex items-center justify-center text-rose-600"><i class="fa-solid fa-umbrella-beach text-xs"></i></div><span class="text-sm font-bold text-stone-700 dark:text-stone-300">Holiday Mode</span></div>
          <label class="cursor-pointer"><input type="checkbox" id="holiday-toggle" class="hidden"><div class="custom-toggle"><div></div></div></label>
        </div>

      <div class="settings-group space-y-3">
        <button onclick="requestNotifications()" class="w-full flex items-center justify-between p-1 group">
          <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-lg bg-amber-100 flex items-center justify-center text-amber-600"><i class="fa-solid fa-bell text-xs"></i></div><span class="text-sm font-bold text-stone-700 dark:text-stone-300">Class Reminders</span></div>
          <i class="fa-solid fa-chevron-right text-[10px] text-stone-400 group-hover:translate-x-1 transition-transform"></i>
        </button>
        <button onclick="setCampusLocation()" class="w-full flex items-center justify-between p-1 group">
          <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-lg bg-emerald-100 flex items-center justify-center text-emerald-600"><i class="fa-solid fa-location-dot text-xs"></i></div><span class="text-sm font-bold text-stone-700 dark:text-stone-300">Set Campus GPS</span></div>
          <i class="fa-solid fa-chevron-right text-[10px] text-stone-400 group-hover:translate-x-1 transition-transform"></i>
        </button>

        <div class="flex justify-between items-center mb-4"><span class="text-xs font-black text-stone-400 uppercase tracking-widest">Target</span><span id="target-display" class="text-lg font-black text-amber-700">75%</span></div>

      </div>

      <button onclick="saveSettings()" class="w-full bg-stone-800 dark:bg-white text-white dark:text-stone-900 font-black py-4 rounded-2xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all mt-4">Save Changes</button>
    </div>
  </div>

  <div id="forecast-modal" class="fixed inset-0 z-50 hidden bg-stone-900/40 backdrop-blur-sm flex items-center justify-center px-4">
    <div class="glass-card w-full max-w-sm rounded-3xl p-6 shadow-2xl">
      <div class="flex justify-between items-center mb-4"><h3 class="text-lg font-black"><i class="fa-solid fa-crystal-ball text-indigo-500 mr-2"></i>Forecaster</h3><button onclick="closeForecast()" class="text-stone-400"><i class="fa-solid fa-xmark"></i></button></div>
      <p id="fc-subject" class="text-xs font-black text-indigo-600 uppercase tracking-widest mb-4">SUBJECT</p>
      <div class="bg-white/50 dark:bg-white/5 rounded-2xl p-4 border border-beige-200 mb-5 text-center">
        <p id="fc-percent" class="text-3xl font-black mb-1">0%</p>
        <div class="w-full bg-beige-200 rounded-full h-2 mb-2 overflow-hidden"><div id="fc-bar" class="h-full bg-indigo-500 transition-all"></div></div>
        <p id="fc-fraction" class="text-[10px] text-stone-400 font-bold uppercase">0 / 0 Classes</p>
      </div>
      <div class="grid grid-cols-2 gap-3"><button onclick="simForecast('present')" class="btn-active bg-emerald-50 text-emerald-600 py-3 rounded-xl font-bold">Present</button><button onclick="simForecast('bunk')" class="btn-active bg-rose-50 text-rose-600 py-3 rounded-xl font-bold">Bunk</button></div>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, initializeFirestore, persistentLocalCache } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({ apiKey: "AIzaSyA3R5plHfBl1VU2MOenTYIZJEKRQ0iIcZQ", authDomain: "attendance-ea8db.firebaseapp.com", projectId: "attendance-ea8db" });
const db = initializeFirestore(app, { localCache: persistentLocalCache() });

let currentUser = "kartik", data = null, currentTab = 'today', myChart = null;
let fcSub = "", fcP = 0, fcT = 0, fcTarget = 75;

const timetable = {
  Monday: [{sub: "DBMS", time: "8:00", room: "VIB 502"}, {sub: "Java", time: "8:50", room: "VIB 502"}, {sub: "ANN", time: "10:30", room: "VIB 207"}, {sub: "DBMS Lab", time: "11:20", room: "VIB 411"}],
  Tuesday: [{sub: "Java Lab", time: "9:40", room: "VIB 412"}, {sub: "Life Skills", time: "12:05", room: "NYB 005"}],
  Wednesday: [{sub: "DBMS", time: "11:20", room: "NYB 312"}, {sub: "COD", time: "12:05", room: "NYB 312"}],
  Thursday: [{sub: "ANN", time: "8:00", room: "KAB 306"}, {sub: "COD", time: "11:20", room: "NYB 312"}, {sub: "Java", time: "12:05", room: "VIB 016"}],
  Friday: [{sub: "COD", time: "8:00", room: "VIB 307"}, {sub: "Life Skills", time: "8:50", room: "VIB 013"}, {sub: "DBMS", time: "9:40", room: "NYB 312"}, {sub: "ANN", time: "11:20", room: "NYB 312"}, {sub: "Java", time: "12:05", room: "VIB 103"}],
  Saturday: [{sub: "ANN Lab", time: "8:00", room: "VIB 412"}, {sub: "DBMS", time: "9:40", room: "NYB 001"}],
  Sunday: []
};
const allSubjects = [...new Set(Object.values(timetable).flat().map(i => i.sub))];

window.switchUser = function() { currentUser = currentUser === "kartik" ? "tara" : "kartik"; render(); }
window.switchTab = function(tab) { currentTab = tab; render(); }
window.toggleTheme = function() { document.documentElement.classList.toggle('dark'); }
window.openSettings = function() { 
  document.getElementById('target-slider').value = data[currentUser].target || 75;
  document.getElementById('target-display').innerText = (data[currentUser].target || 75) + '%';
  document.getElementById('holiday-toggle').checked = data[currentUser].holidayMode || false;
  document.getElementById('theme-toggle').checked = document.documentElement.classList.contains('dark');
  
  let subHtml = "";
  allSubjects.forEach(sub => {
    let val = data[currentUser].targets?.[sub] || data[currentUser].target || 75;
    subHtml += `<div class="flex justify-between items-center bg-white/50 dark:bg-white/5 px-3 py-2 rounded-xl border border-beige-200 dark:border-white/10"><span class="text-[10px] font-black text-stone-700 dark:text-stone-400 uppercase tracking-wider">${sub}</span><div class="flex items-center gap-1"><input type="number" id="target-${sub.replace(/\s+/g, '')}" value="${val}" class="w-10 text-center bg-transparent text-sm font-black text-amber-700 focus:outline-none"><span class="text-[10px] text-stone-400">%</span></div></div>`;
  });
  document.getElementById('subject-targets-container').innerHTML = subHtml;
  document.getElementById('settings-modal').classList.remove('hidden'); 
}
window.closeSettings = function() { document.getElementById('settings-modal').classList.add('hidden'); }
window.saveSettings = async function() {
  data[currentUser].target = parseInt(document.getElementById('target-slider').value);
  data[currentUser].holidayMode = document.getElementById('holiday-toggle').checked;
  if(!data[currentUser].targets) data[currentUser].targets = {};
  allSubjects.forEach(sub => {
    data[currentUser].targets[sub] = parseInt(document.getElementById(`target-${sub.replace(/\s+/g, '')}`).value) || data[currentUser].target;
  });
  closeSettings();
  await setDoc(doc(db, "attendance", "shared"), data);
}
// --- Toast Notification Logic ---
window.showToast = function(msg, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  
  // Set colors and icons based on the action
  let colors = "bg-stone-800 text-white";
  let icon = "fa-check-circle";
  
  if (type === 'present') { colors = "bg-emerald-500 text-white shadow-emerald-500/20"; icon = "fa-check"; }
  else if (type === 'bunk') { colors = "bg-rose-500 text-white shadow-rose-500/20"; icon = "fa-xmark"; }
  else if (type === 'cancelled') { colors = "bg-stone-500 text-white shadow-stone-500/20"; icon = "fa-ban"; }
  else if (type === 'undo') { colors = "bg-amber-500 text-white shadow-amber-500/20"; icon = "fa-rotate-left"; }

  toast.className = `flex items-center gap-3 px-4 py-3 rounded-2xl shadow-xl transition-all duration-300 transform -translate-y-10 opacity-0 ${colors}`;
  toast.innerHTML = `<i class="fa-solid ${icon}"></i><span class="text-sm font-bold tracking-wide">${msg}</span>`;
  
  container.appendChild(toast);
  
  // Animate sliding in
  requestAnimationFrame(() => {
    toast.classList.remove('-translate-y-10', 'opacity-0');
    toast.classList.add('translate-y-0', 'opacity-100');
  });

  // Animate sliding out and remove after 2.5 seconds
  setTimeout(() => {
    toast.classList.remove('translate-y-0', 'opacity-100');
    toast.classList.add('-translate-y-10', 'opacity-0');
    setTimeout(() => toast.remove(), 300);
  }, 2500);
};

window.mark = async function(sub, type) {
  let d = data[currentUser][sub] || {p: 0, t: 0, history: []};
  if(type !== "cancelled") { d.t++; if(type === "present") d.p++; }
  d.history.push({ type, date: Date.now() });
  data[currentUser][sub] = d;
  await setDoc(doc(db, "attendance", "shared"), data);
  
  // Trigger the visual confirmation
  let text = type === 'present' ? 'Marked Present' : type === 'bunk' ? 'Marked Bunk' : 'Class Cancelled';
  showToast(`${sub}: ${text}`, type);
}

window.undo = async function(sub) {
  let d = data[currentUser][sub];
  if(!d || !d.history.length) {
    showToast("Nothing to undo here!", "undo");
    return;
  }
  let last = d.history.pop();
  if(last.type === "present") { d.p--; d.t--; } else if(last.type === "bunk") { d.t--; }
  await setDoc(doc(db, "attendance", "shared"), data);
  
  // Trigger the visual confirmation
  showToast(`Undid last action for ${sub}`, 'undo');
}


window.deleteEntry = async function(sub, timestamp) {
  if (!confirm("Are you sure you want to delete this entry?")) return;
  let d = data[currentUser][sub];
  let index = d.history.findIndex(h => h.date === timestamp);
  if (index > -1) {
    let item = d.history[index];
    if (item.type === "present") { d.p--; d.t--; }
    else if (item.type === "bunk") { d.t--; }
    d.history.splice(index, 1);
    await setDoc(doc(db, "attendance", "shared"), data);
  }
};

window.requestNotifications = function() {
  if ("Notification" in window) {
    Notification.requestPermission().then(permission => {
      alert(permission === "granted" ? "Notifications enabled!" : "Notifications denied.");
    });
  } else {
    alert("Your browser does not support notifications.");
  }
};

window.setCampusLocation = function() {
  const statusText = document.getElementById('campus-status');
  statusText.innerText = "Locating...";
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (position) => {
        statusText.innerText = `Campus set: ${position.coords.latitude.toFixed(4)}, ${position.coords.longitude.toFixed(4)}`;
      },
      () => { statusText.innerText = "Location access denied."; }
    );
  } else {
    statusText.innerText = "Geolocation not supported.";
  }
};

window.sendNudge = function() {
  alert("Nudge sent to partner!");
};

// --- Forecast Modal Logic ---
window.openForecast = function(sub) {
  fcSub = sub;
  let d = data[currentUser][sub] || {p: 0, t: 0};
  fcP = d.p; fcT = d.t;
  fcTarget = data[currentUser].targets?.[sub] || data[currentUser].target || 75;
  document.getElementById('fc-subject').innerText = sub;
  updateForecastUI();
  document.getElementById('forecast-modal').classList.remove('hidden');
};

window.closeForecast = function() {
  document.getElementById('forecast-modal').classList.add('hidden');
};

window.updateForecastUI = function() {
  let per = fcT ? ((fcP / fcT) * 100).toFixed(1) : 0;
  document.getElementById('fc-percent').innerText = per + '%';
  document.getElementById('fc-fraction').innerText = `${fcP} / ${fcT} Classes`;
  document.getElementById('fc-bar').style.width = per + '%';
  document.getElementById('fc-bar').className = `h-full transition-all ${parseFloat(per) < fcTarget ? 'bg-rose-500' : 'bg-emerald-500'}`;
};

window.simForecast = function(type) {
  fcT++;
  if (type === 'present') fcP++;
  updateForecastUI();
};

/* Rendering Engine */
function calculateStats(userObj) {
  let p = 0, t = 0, allHist = [];
  Object.keys(userObj).forEach(k => {
    if(!['target', 'holidayMode', 'targets', 'nudge', 'lastArrival', 'campusLat', 'campusLng'].includes(k)) {
      p += userObj[k].p; t += userObj[k].t;
      (userObj[k].history || []).forEach(h => allHist.push({...h, sub: k}));
    }
  });
  allHist.sort((a,b) => b.date - a.date);
  let streak = 0;
  for(let item of allHist) { if(item.type === 'present') streak++; else if(item.type === 'bunk') break; }
  return { p, t, percent: t === 0 ? "0.00" : ((p/t)*100).toFixed(2), streak, history: allHist };
}

function renderChart(stats) {
  if (myChart) myChart.destroy();
  const ctx = document.getElementById('attendanceChart');
  if(!ctx) return;
  myChart = new Chart(ctx, {
    type: 'doughnut',
    data: { datasets: [{ data: [stats.p, stats.t - stats.p], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0 }] },
    options: { cutout: '80%', plugins: { legend: { display: false } } }
  });
}

function render() {
  if(!data) return;
  const stats = calculateStats(data[currentUser]);
  const partner = currentUser === "kartik" ? "tara" : "kartik";
  const partnerStats = calculateStats(data[partner]);
  const isWinning = parseFloat(stats.percent) > parseFloat(partnerStats.percent);
  const targetNum = data[currentUser].target || 75;

  document.getElementById("name").innerText = currentUser === "kartik" ? "Kartik" : "Tara";
  document.getElementById("overall").innerText = `${stats.percent}%`;
  document.getElementById("streak-count").innerText = `${stats.streak} Streak`;
  document.getElementById("streak-badge").style.display = stats.streak > 0 ? "flex" : "none";
  
  let c = document.getElementById("content");
  c.innerHTML = "";
  // Update Navigation Active States
  const tabs = ['today', 'tracker', 'history', 'timetable'];
  tabs.forEach(t => {
    const el = document.getElementById(`tab-${t}`);
    if (el) {
      if (t === currentTab) {
        el.className = "btn-active flex flex-col items-center gap-1 text-amber-700 w-14";
      } else {
        el.className = "btn-active flex flex-col items-center gap-1 text-stone-400 w-14";
      }
    }
  });

    if(currentTab === 'today') {
    const day = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];
    const todayClasses = timetable[day] || [];
    const isHoliday = data[currentUser].holidayMode; // Check if holiday mode is toggled on

    c.innerHTML = `<h2 class="text-2xl font-black mb-4">Your Day</h2>`;

    if (isHoliday) {
      // Show Holiday Mode UI
      c.innerHTML += `
        <div class="glass-card rounded-3xl p-8 text-center animate-slide-up mt-10">
          <div class="w-20 h-20 bg-rose-100 dark:bg-rose-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-umbrella-beach text-3xl text-rose-500"></i>
          </div>
          <h3 class="text-xl font-black text-stone-800 dark:text-white mb-2">Holiday Mode</h3>
          <p class="text-sm text-stone-500 dark:text-slate-400 font-medium">Kick back and relax. Your attendance is paused.</p>
        </div>`;
    } else if (todayClasses.length === 0) {
      // Show No Classes UI (e.g., Sunday)
      c.innerHTML += `
        <div class="glass-card rounded-3xl p-8 text-center animate-slide-up mt-10">
          <div class="w-20 h-20 bg-emerald-100 dark:bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-mug-hot text-3xl text-emerald-500"></i>
          </div>
          <h3 class="text-xl font-black text-stone-800 dark:text-white mb-2">It's a Free Day!</h3>
          <p class="text-sm text-stone-500 dark:text-slate-400 font-medium">Enjoy your ${day}. You have no classes scheduled.</p>
        </div>`;
    } else {
      // Show Normal Classes
      todayClasses.forEach(i => {
        let d = data[currentUser][i.sub] || {p:0, t:0};
        c.innerHTML += `<div class="glass-card rounded-3xl p-5 mb-4 animate-slide-up">
          <div class="flex justify-between mb-4"><div><h3 class="text-xl font-bold">${i.sub}</h3><p class="text-stone-500 text-sm font-medium mt-1">${i.time} • ${i.room}</p></div><div class="text-xs font-black text-amber-700 bg-amber-50 px-2 py-1 rounded-lg border border-amber-100">${d.t ? ((d.p/d.t)*100).toFixed(0) : 0}%</div></div>
          <div class="grid grid-cols-4 gap-2">
            <button onclick="mark('${i.sub}','present')" class="btn-active bg-emerald-50 text-emerald-600 py-3 rounded-xl"><i class="fa-solid fa-check"></i></button>
            <button onclick="mark('${i.sub}','bunk')" class="btn-active bg-rose-50 text-rose-600 py-3 rounded-xl"><i class="fa-solid fa-xmark"></i></button>
            <button onclick="mark('${i.sub}','cancelled')" class="btn-active bg-stone-100 text-stone-500 py-3 rounded-xl"><i class="fa-solid fa-ban"></i></button>
            <button onclick="undo('${i.sub}')" class="btn-active bg-white text-stone-300 py-3 rounded-xl border border-beige-200"><i class="fa-solid fa-rotate-left"></i></button>
          </div>
        </div>`;
      });
    }
  }


  if(currentTab === 'tracker') {
    c.innerHTML = `<div class="glass-card rounded-2xl p-4 mb-6 flex justify-between items-center animate-slide-up">
      <div class="flex items-center gap-3">
        <div class="relative"><div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-amber-700 font-black border border-white">${partner[0].toUpperCase()}</div>${!isWinning ? '<i class="fa-solid fa-crown absolute -top-3 -left-2 text-amber-500 text-base rotate-[-20deg]"></i>' : ''}</div>
        <div><p class="text-[10px] text-stone-500 uppercase font-black tracking-widest">${partner}'s Status</p><p class="text-base font-black">${partnerStats.percent}%</p></div>
      </div>
      <div class="flex items-center gap-2">${isWinning ? '<span class="text-[9px] font-black text-emerald-600 bg-emerald-100 px-2 py-1 rounded-full uppercase">You Lead!</span>' : ''}<button onclick="sendNudge()" class="bg-amber-200 text-amber-800 w-9 h-9 rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-bell animate-swing"></i></button></div>
    </div>
    <div class="glass-card rounded-3xl p-5 mb-6 flex items-center justify-between animate-slide-up">
      <div class="w-20 h-20 relative"><canvas id="attendanceChart"></canvas></div>
      <div class="flex-1 pl-6"><p class="text-[10px] text-stone-400 uppercase font-black tracking-widest mb-1">Target: ${targetNum}%</p><p class="text-sm font-bold"><span class="text-emerald-500">${stats.p}</span> Present / <span class="text-rose-500">${stats.t - stats.p}</span> Bunked</p></div>
    </div>`;
    setTimeout(() => renderChart(stats), 50);

    allSubjects.forEach(sub => {
      let d = data[currentUser][sub] || {p: 0, t: 0};
      let per = d.t ? ((d.p/d.t)*100).toFixed(1) : 0;
      let bunkText = "", bunkColor = "";
      if (parseFloat(per) >= targetNum) {
        let safe = Math.floor((d.p * 100 / targetNum) - d.t);
        bunkText = safe > 0 ? `✅ Safe to bunk: ${safe}` : `⚡ On the edge`;
        bunkColor = "text-emerald-600";
      } else {
        let req = Math.ceil((targetNum * d.t - 100 * d.p) / (100 - targetNum));
        bunkText = `⚠️ Attend next: ${req}`;
        bunkColor = "text-rose-500";
      }
      c.innerHTML += `<div class="glass-card rounded-3xl p-5 mb-4 animate-slide-up relative overflow-hidden">
        <div class="flex justify-between items-start mb-2">
          <div><h3 class="text-lg font-bold">${sub}</h3><span class="text-[10px] font-black ${bunkColor} uppercase px-2 py-0.5 bg-white/50 rounded-full border border-current/10">${bunkText}</span></div>
          <div class="text-right"><div class="text-2xl font-black ${parseFloat(per) < targetNum ? 'text-rose-500' : 'text-emerald-500'}">${per}%</div><button onclick="openForecast('${sub}')" class="text-indigo-600 text-[10px] font-black mt-2 tracking-widest uppercase"><i class="fa-solid fa-crystal-ball"></i> Forecast</button></div>
        </div>
        <div class="w-full bg-beige-200 rounded-full h-2.5 mb-2 overflow-hidden relative"><div class="target-marker" style="left: ${targetNum}%"></div><div class="h-full rounded-full ${parseFloat(per) < targetNum ? 'bg-rose-500' : 'bg-emerald-500'}" style="width: ${per}%"></div></div>
        <div class="flex justify-between text-[10px] font-black text-stone-400 uppercase tracking-widest"><span>Target: ${targetNum}%</span><span>${d.p} / ${d.t} Classes</span></div>
      </div>`;
    });
  }

      if(currentTab === 'history') {
    let delay = 0; // FIX: Declare delay variable
    c.innerHTML = `<h2 class="text-xl font-black text-stone-800 dark:text-white mb-4 mt-2">Recent Activity</h2>`;
    if(stats.history.length === 0) { 
      c.innerHTML += `<div class="text-center text-stone-500 dark:text-slate-500 font-medium mt-10">No history yet.</div>`; 
      return; 
    }
    
    stats.history.slice(0, 50).forEach(item => {
      let dateObj = new Date(item.date);
      let dateString = "Unknown Date"; 
      
      // FIX: Proper date validation
      if (item.date && !isNaN(dateObj.getTime())) {
        dateString = `${dateObj.toLocaleDateString([], { month: 'short', day: 'numeric' })} • ${dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
      }

      let icon = item.type === 'present' ? '<i class="fa-solid fa-check text-emerald-600 dark:text-emerald-400"></i>' : 
                 item.type === 'bunk' ? '<i class="fa-solid fa-xmark text-rose-600 dark:text-rose-400"></i>' : '<i class="fa-solid fa-ban text-stone-500 dark:text-slate-400"></i>';
      
      // FIX: Pass item.date to deleteEntry instead of missing item.id
      c.innerHTML += `
        <div class="flex items-center gap-4 p-3 border-b border-beige-200/50 dark:border-white/5 opacity-0 animate-slide-up" style="animation-delay: ${delay}ms">
          <div class="w-10 h-10 rounded-full bg-white/60 dark:bg-slate-800 border border-beige-200 dark:border-slate-700 flex items-center justify-center shadow-sm">${icon}</div>
          <div class="flex-1">
            <p class="text-stone-800 dark:text-white font-bold">${item.sub}</p>
            <p class="text-[10px] text-stone-500 dark:text-slate-400 font-black uppercase tracking-wider">${item.type} • ${dateString}</p>
          </div>
          <button onclick="deleteEntry('${item.sub}', ${item.date})" class="text-stone-300 hover:text-rose-500 transition-colors"><i class="fa-solid fa-trash-can text-xs"></i></button>
        </div>
      `;
      delay += 20;
    });
    return;
  }

    
    

  if(currentTab === 'timetable') {
    Object.keys(timetable).forEach(day => {
      if(!timetable[day].length) return;
      let html = `<div class="mb-8 animate-slide-up"><h3 class="text-amber-700 font-black uppercase text-sm tracking-widest mb-3 ml-1">${day}</h3><div class="space-y-3">`;
      timetable[day].forEach(i => {
        html += `<div class="glass-card rounded-2xl p-4 flex justify-between items-center"><div><b class="text-md block font-bold">${i.sub}</b><span class="text-stone-500 text-xs font-medium uppercase tracking-wider">${i.room}</span></div><span class="text-xs font-black text-amber-800 bg-amber-50 px-3 py-1.5 rounded-xl border border-amber-100">${i.time}</span></div>`;
      });
      c.innerHTML += html + `</div></div>`;
    });
  }
}

async function load() {
  onSnapshot(
    doc(db, "attendance", "shared"), 
    async (snap) => {
      if (snap.exists()) { 
        data = snap.data(); 
        render(); 
      } else {
        // This runs if the database is completely empty
        console.log("No data found, creating initial database...");
        data = {
          kartik: { target: 75, holidayMode: false },
          tara: { target: 75, holidayMode: false }
        };
        await setDoc(doc(db, "attendance", "shared"), data);
        render();
      }
    }, 
    (error) => {
      // This runs if your Firebase Rules are blocking access
      console.error("Firebase Error: ", error);
      document.getElementById("content").innerHTML = `
        <div class="h-full flex flex-col items-center justify-center p-6 text-center">
          <i class="fa-solid fa-triangle-exclamation text-4xl text-rose-500 mb-4"></i>
          <h3 class="text-lg font-black text-stone-800 dark:text-white mb-2">Database Error</h3>
          <p class="text-sm text-stone-500 mb-4">${error.message}</p>
          <p class="text-[10px] font-bold text-amber-600 bg-amber-50 p-3 rounded-xl border border-amber-200">
            Fix: Go to Firebase Console > Firestore Database > Rules.<br>Set them to allow read/write.
          </p>
        </div>`;
    }
  );
}
load();

load();
</script>
</body>
