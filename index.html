<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Attendance Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" sizes="180x180" href="icon2.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            glass: 'rgba(255, 255, 255, 0.05)',
            glassBorder: 'rgba(255, 255, 255, 0.1)'
          },
          animation: {
            'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'fade-in': 'fadeIn 0.2s ease-out forwards',
          },
          keyframes: {
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background: linear-gradient(135deg, #020617, #0f172a, #1e1b4b);
      color: white;
      -webkit-tap-highlight-color: transparent;
    }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    .btn-active:active { transform: scale(0.95); }
    .status-present { background: linear-gradient(145deg, rgba(16, 185, 129, 0.1), rgba(255,255,255,0.02)); border-color: rgba(16, 185, 129, 0.2); }
    .status-bunk { background: linear-gradient(145deg, rgba(244, 63, 94, 0.1), rgba(255,255,255,0.02)); border-color: rgba(244, 63, 94, 0.2); }
    .status-cancelled { background: linear-gradient(145deg, rgba(148, 163, 184, 0.1), rgba(255,255,255,0.02)); border-color: rgba(148, 163, 184, 0.2); }
  </style>
</head>

<body class="flex justify-center h-screen overflow-hidden selection:bg-indigo-500/30 antialiased relative">

  <div class="w-full max-w-md h-full flex flex-col relative bg-slate-950/50 shadow-2xl ring-1 ring-white/5">
    
    <header class="pt-10 pb-4 px-6 glass-card rounded-b-3xl z-20 sticky top-0 flex justify-between items-center">
      <div>
        <p class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-1">Dashboard</p>
        <button onclick="switchUser()" class="btn-active group flex items-center gap-2 text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-300">
          <span id="name">Kartik</span>
          <i class="fa-solid fa-arrows-rotate text-sm text-indigo-400 group-hover:rotate-180 transition-transform duration-500"></i>
        </button>
      </div>
      <div class="text-right flex items-center gap-3">
        <div>
          <p class="text-slate-400 text-xs font-medium uppercase tracking-wider mb-1">Overall</p>
          <div id="overall" class="text-xl font-bold text-emerald-400 drop-shadow-[0_0_8px_rgba(52,211,153,0.5)]">--%</div>
        </div>
        <button onclick="openSettings()" class="btn-active w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-slate-300 hover:text-white">
          <i class="fa-solid fa-gear"></i>
        </button>
      </div>
    </header>

    <main id="content" class="flex-1 overflow-y-auto px-5 pt-6 pb-28 space-y-4 relative z-10 scroll-smooth">
      <div class="flex h-full items-center justify-center animate-pulse">
        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-indigo-500"></i>
      </div>
    </main>

    <nav class="absolute bottom-0 w-full px-6 pb-8 pt-4 glass-card rounded-t-3xl z-20 flex justify-around items-center">
      <button onclick="switchTab('today')" id="tab-today" class="btn-active flex flex-col items-center gap-1 text-indigo-400 transition-colors w-16">
        <i class="fa-solid fa-bolt text-xl mb-1"></i>
        <span class="text-[10px] font-bold tracking-wide">Today</span>
      </button>
      <button onclick="switchTab('tracker')" id="tab-tracker" class="btn-active flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300 transition-colors w-16">
        <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
        <span class="text-[10px] font-bold tracking-wide">Tracker</span>
      </button>
      <button onclick="switchTab('timetable')" id="tab-timetable" class="btn-active flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300 transition-colors w-16">
        <i class="fa-solid fa-calendar-days text-xl mb-1"></i>
        <span class="text-[10px] font-bold tracking-wide">Schedule</span>
      </button>
    </nav>
  </div>

  <div id="settings-modal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex items-center justify-center px-4 animate-fade-in">
    <div class="glass-card w-full max-w-sm rounded-3xl p-6 shadow-2xl border border-white/10">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold text-white">Target Setter</h3>
        <button onclick="closeSettings()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>
      <p class="text-sm text-slate-400 mb-4">Set your minimum required attendance percentage. The math will update automatically.</p>
      <div class="flex items-center gap-4 mb-8">
        <input type="range" id="target-slider" min="50" max="100" value="75" class="w-full accent-indigo-500" oninput="document.getElementById('target-display').innerText = this.value + '%'">
        <span id="target-display" class="text-xl font-bold text-indigo-400 w-16 text-right">75%</span>
      </div>
      <button onclick="saveSettings()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-xl transition-colors">
        Save Target
      </button>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, initializeFirestore, persistentLocalCache, persistentMultipleTabManager } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyA3R5plHfBl1VU2MOenTYIZJEKRQ0iIcZQ",
  authDomain: "attendance-ea8db.firebaseapp.com",
  projectId: "attendance-ea8db"
});

// Enable Offline Persistence for True PWA feel
const db = initializeFirestore(app, {
  localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()})
});

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
  });
}

let currentUser = "kartik";
let data = null;
let currentTab = 'today'; 
let myChart = null; // Holds Chart.js instance

const timetable = {
  Monday: [{sub: "DBMS", time: "8:00", room: "VIB 502"}, {sub: "Java", time: "8:50", room: "VIB 502"}, {sub: "ANN", time: "10:30", room: "VIB 207"}, {sub: "DBMS Lab", time: "11:20", room: "VIB 411"}],
  Tuesday: [{sub: "Java Lab", time: "9:40", room: "VIB 412"}, {sub: "Life Skills", time: "12:05", room: "NYB 005"}],
  Wednesday: [{sub: "DBMS", time: "11:20", room: "NYB 312"}, {sub: "COD", time: "12:05", room: "NYB 312"}],
  Thursday: [{sub: "ANN", time: "8:00", room: "KAB 306"}, {sub: "COD", time: "11:20", room: "NYB 312"}, {sub: "Java", time: "12:05", room: "VIB 016"}],
  Friday: [{sub: "COD", time: "8:00", room: "VIB 307"}, {sub: "Life Skills", time: "8:50", room: "VIB 013"}, {sub: "DBMS", time: "9:40", room: "NYB 312"}, {sub: "ANN", time: "11:20", room: "NYB 312"}, {sub: "Java", time: "12:05", room: "VIB 103"}],
  Saturday: [{sub: "ANN Lab", time: "8:00", room: "VIB 412"}, {sub: "DBMS", time: "9:40", room: "NYB 001"}],
  Sunday: []
};

/* Global Functions */
window.switchUser = function() {
  currentUser = currentUser === "kartik" ? "tara" : "kartik";
  document.getElementById("name").innerText = currentUser === "kartik" ? "Kartik" : "Tara";
  render();
}

window.switchTab = function(tab) {
  currentTab = tab;
  ['today', 'tracker', 'timetable'].forEach(t => {
    const el = document.getElementById(`tab-${t}`);
    if(t === tab) {
      el.classList.replace('text-slate-500', 'text-indigo-400');
    } else {
      el.classList.replace('text-indigo-400', 'text-slate-500');
    }
  });
  render();
}

window.openSettings = function() {
  const target = data[currentUser].target || 75;
  document.getElementById('target-slider').value = target;
  document.getElementById('target-display').innerText = `${target}%`;
  document.getElementById('settings-modal').classList.remove('hidden');
}

window.closeSettings = function() {
  document.getElementById('settings-modal').classList.add('hidden');
}

window.saveSettings = async function() {
  const newTarget = parseInt(document.getElementById('target-slider').value);
  data[currentUser].target = newTarget;
  closeSettings();
  render();
  await setDoc(doc(db, "attendance", "shared"), data);
}

window.mark = async function(sub, type) {
  let d = data[currentUser][sub] || {p: 0, t: 0, history: []};

  if(type === "cancelled") {
    // Just add to history, don't increment counters
    if(!d.history) d.history = [];
    d.history.push("cancelled");
  } else {
    d.t++;
    if(type === "present") d.p++;
    if(!d.history) d.history = [];
    d.history.push(type);
  }

  data[currentUser][sub] = d;
  render(); 
  await setDoc(doc(db, "attendance", "shared"), data);
}

window.undo = async function(sub) {
  let d = data[currentUser][sub];
  if(!d || !d.history || d.history.length === 0) return;

  let last = d.history.pop();
  if(last === "present") { d.p--; d.t--; }
  else if(last === "bunk") { d.t--; }
  // if cancelled, just popping from history is enough

  render();
  await setDoc(doc(db, "attendance", "shared"), data);
}

/* Dynamic Target Math */
function overall() {
  let p = 0, t = 0;
  Object.keys(data[currentUser]).forEach(k => {
    if(k !== 'target') { p += data[currentUser][k].p; t += data[currentUser][k].t; }
  });
  return { p, t, percent: t === 0 ? "0.00" : ((p / t) * 100).toFixed(2) };
}

function calcBunk(p, t) {
  let target = (data[currentUser].target || 75) / 100;
  let x = Math.floor((p / target) - t);
  return x > 0 ? x : 0;
}

function needTarget(p, t) {
  let target = (data[currentUser].target || 75) / 100;
  if(target === 1) return t === p ? 0 : "∞"; // prevent divide by zero
  let x = Math.ceil((target * t - p) / (1 - target));
  return x > 0 ? x : 0;
}

function renderChart() {
  const stats = overall();
  const absent = stats.t - stats.p;
  
  if (myChart) myChart.destroy();
  
  const ctx = document.getElementById('attendanceChart');
  if(!ctx) return;

  myChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Attended', 'Bunked'],
      datasets: [{
        data: [stats.p, absent],
        backgroundColor: ['#34d399', '#fb7185'],
        borderWidth: 0,
        hoverOffset: 4
      }]
    },
    options: {
      cutout: '75%',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15, 23, 42, 0.9)',
          titleFont: { family: "'Plus Jakarta Sans', sans-serif" },
          bodyFont: { family: "'Plus Jakarta Sans', sans-serif" },
          padding: 12,
          cornerRadius: 8
        }
      }
    }
  });
}

/* UI Rendering */
function render() {
  if(!data) return;
  const targetNum = data[currentUser].target || 75;
  const stats = overall();
  const overallEl = document.getElementById("overall");
  overallEl.innerText = `${stats.percent}%`;
  overallEl.className = `text-2xl font-extrabold tracking-tight ${parseFloat(stats.percent) >= targetNum ? 'text-emerald-400 drop-shadow-[0_0_8px_rgba(52,211,153,0.5)]' : 'text-rose-400 drop-shadow-[0_0_8px_rgba(244,63,94,0.5)]'}`;

  let c = document.getElementById("content");
  c.innerHTML = "";
  let delay = 0;

  /* ---- TODAY VIEW ---- */
  if(currentTab === 'today') {
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const todayName = days[new Date().getDay()];
    const todayClasses = timetable[todayName];

    c.innerHTML = `
      <div class="flex items-center justify-between mb-4 mt-2">
        <h2 class="text-2xl font-bold text-white">Your Day</h2>
        <span class="px-3 py-1 bg-indigo-500/20 text-indigo-300 rounded-full text-xs font-bold uppercase tracking-wider">${todayName}</span>
      </div>
    `;

    if(todayClasses.length === 0) {
      c.innerHTML += `<div class="glass-card rounded-3xl p-8 text-center text-slate-400 opacity-0 animate-slide-up"><i class="fa-solid fa-mug-hot text-4xl mb-4 text-indigo-400/50"></i><p>No classes today. Enjoy!</p></div>`;
      return;
    }

    todayClasses.forEach(i => {
      let d = data[currentUser][i.sub] || {p: 0, t: 0, history: []};
      let per = d.t ? ((d.p / d.t) * 100).toFixed(1) : 0;
      let last = d.history?.[d.history.length - 1];
      
      let cardClass = "glass-card rounded-3xl p-5 mb-4 opacity-0 animate-slide-up border-l-4";
      if(last === "present") cardClass += " border-l-emerald-500 status-present";
      else if(last === "bunk") cardClass += " border-l-rose-500 status-bunk";
      else if(last === "cancelled") cardClass += " border-l-slate-400 status-cancelled";
      else cardClass += " border-l-indigo-500";

      c.innerHTML += `
        <div class="${cardClass}" style="animation-delay: ${delay}ms">
          <div class="flex justify-between items-start mb-4">
            <div>
              <h3 class="text-xl font-bold text-white">${i.sub}</h3>
              <p class="text-slate-400 text-sm mt-1"><i class="fa-regular fa-clock text-indigo-400 mr-1"></i> ${i.time} &nbsp;&nbsp; <i class="fa-solid fa-location-dot text-rose-400/80 mr-1"></i> ${i.room}</p>
            </div>
            <div class="bg-white/5 px-2 py-1 rounded-lg text-xs font-bold text-slate-300">${per}%</div>
          </div>
          <div class="grid grid-cols-4 gap-2">
            <button onclick="mark('${i.sub}','present')" class="col-span-1 btn-active bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 py-2 rounded-xl text-lg transition-all"><i class="fa-solid fa-check"></i></button>
            <button onclick="mark('${i.sub}','bunk')" class="col-span-1 btn-active bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/30 py-2 rounded-xl text-lg transition-all"><i class="fa-solid fa-xmark"></i></button>
            <button onclick="mark('${i.sub}','cancelled')" class="col-span-1 btn-active bg-slate-500/10 hover:bg-slate-500/20 text-slate-400 border border-slate-500/30 py-2 rounded-xl text-lg transition-all" title="Cancelled"><i class="fa-solid fa-ban"></i></button>
            <button onclick="undo('${i.sub}')" class="col-span-1 btn-active bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-600/50 py-2 rounded-xl text-lg transition-all"><i class="fa-solid fa-rotate-left"></i></button>
          </div>
        </div>
      `;
      delay += 50;
    });
    return;
  }

  /* ---- TRACKER VIEW (With Chart) ---- */
  if(currentTab === 'tracker') {
    c.innerHTML = `
      <div class="glass-card rounded-3xl p-5 mb-6 flex items-center justify-between opacity-0 animate-slide-up">
        <div class="w-24 h-24 relative"><canvas id="attendanceChart"></canvas></div>
        <div class="flex-1 pl-6">
          <p class="text-xs text-slate-400 uppercase tracking-widest font-bold mb-1">Target: ${targetNum}%</p>
          <p class="text-sm text-slate-300 mb-1"><span class="inline-block w-3 h-3 rounded-full bg-emerald-400 mr-2"></span>${stats.p} Classes Attended</p>
          <p class="text-sm text-slate-300"><span class="inline-block w-3 h-3 rounded-full bg-rose-400 mr-2"></span>${stats.t - stats.p} Classes Bunked</p>
        </div>
      </div>
    `;
    setTimeout(renderChart, 50); // Give canvas time to mount

    let subjects = {};
    Object.keys(timetable).forEach(day => timetable[day].forEach(i => subjects[i.sub] = i));
    
    Object.values(subjects).forEach(i => {
      let d = data[currentUser][i.sub] || {p: 0, t: 0, history: []};
      let per = d.t ? ((d.p / d.t) * 100).toFixed(1) : 0;
      let isDanger = parseFloat(per) < targetNum;
      
      c.innerHTML += `
        <div class="glass-card rounded-3xl p-5 mb-4 opacity-0 animate-slide-up relative overflow-hidden" style="animation-delay: ${delay}ms">
          ${isDanger && d.t > 0 ? '<div class="absolute top-0 right-0 w-16 h-16 bg-rose-500/20 blur-2xl rounded-full"></div>' : ''}
          <div class="flex justify-between items-end relative z-10">
            <div>
              <h3 class="text-lg font-bold text-white">${i.sub}</h3>
              <p class="text-xs text-slate-400 mt-1">${d.p} / ${d.t} attended</p>
            </div>
            <div class="text-right">
              <div class="text-2xl font-black ${isDanger && d.t > 0 ? 'text-rose-400' : 'text-emerald-400'}">${per}%</div>
            </div>
          </div>
          <div class="w-full bg-slate-800/50 rounded-full h-1.5 mt-3 mb-4 overflow-hidden">
            <div class="h-1.5 rounded-full ${isDanger ? 'bg-gradient-to-r from-rose-500 to-pink-500' : 'bg-gradient-to-r from-emerald-400 to-teal-500'} transition-all duration-500" style="width: ${per}%"></div>
          </div>
          <div class="flex gap-2 text-xs">
            <div class="flex-1 bg-white/5 rounded-lg py-1.5 text-center text-slate-300"><span class="text-emerald-400 font-bold">${calcBunk(d.p, d.t)}</span> safe bunks</div>
            <div class="flex-1 bg-white/5 rounded-lg py-1.5 text-center text-slate-300"><span class="${needTarget(d.p, d.t) > 0 ? 'text-rose-400 font-bold' : 'text-slate-500'}">${needTarget(d.p, d.t)}</span> to reach target</div>
          </div>
        </div>
      `;
      delay += 50;
    });
    return;
  }

  /* ---- TIMETABLE VIEW ---- */
  if(currentTab === 'timetable') {
    Object.keys(timetable).forEach(day => {
      if(timetable[day].length === 0) return; // Skip Sunday if empty
      let dayHtml = `<div class="mb-8 opacity-0 animate-slide-up" style="animation-delay: ${delay}ms">
          <h3 class="text-indigo-300 font-bold text-lg mb-3 ml-1">${day}</h3>
          <div class="space-y-3">`;
      timetable[day].forEach(i => {
        dayHtml += `
          <div class="glass-card rounded-2xl p-4 flex justify-between items-center">
            <div>
              <b class="text-white text-md block">${i.sub}</b>
              <span class="text-slate-400 text-xs"><i class="fa-solid fa-location-dot text-rose-400 mr-1"></i> ${i.room}</span>
            </div>
            <span class="text-xs font-bold text-indigo-400 bg-indigo-500/10 px-3 py-1.5 rounded-lg">${i.time}</span>
          </div>`;
      });
      dayHtml += `</div></div>`;
      c.innerHTML += dayHtml;
      delay += 50;
    });
  }
}

async function load() {
  try {
    let snap = await getDoc(doc(db, "attendance", "shared"));
    if(snap.exists()) {
      data = snap.data();
      if(!data.kartik) data.kartik = { target: 75 };
      if(!data.tara) data.tara = { target: 75 };
      render();
    } else {
      document.getElementById("content").innerHTML = `<div class="text-center text-slate-400 mt-10">No data found.</div>`;
    }
  } catch (error) {
    document.getElementById("content").innerHTML = `<div class="text-center text-rose-400 mt-10">Database connection error.</div>`;
  }
}

load();
</script>
</body>
</html>
