<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Attendance Tracker Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F4ECE1">
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            beige: { 50: '#FFFCF5', 100: '#F4ECE1', 200: '#E8D8C8', 300: '#D5C0A9' },
            slate: { 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
          },
          animation: {
            'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'bounce-soft': 'bounceSoft 2s infinite',
            'swing': 'swing 2s ease-in-out infinite'
          },
          keyframes: {
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            bounceSoft: { '0%, 100%': { transform: 'translateY(-5%)' }, '50%': { transform: 'translateY(0)' } },
            swing: { '0%, 100%': { transform: 'rotate(0deg)' }, '20%': { transform: 'rotate(15deg)' }, '40%': { transform: 'rotate(-10deg)' }, '60%': { transform: 'rotate(5deg)' }, '80%': { transform: 'rotate(-5deg)' } }
          }
        }
      }
    }
  </script>

  <style>
    body { color: #292524; -webkit-tap-highlight-color: transparent; transition: all 0.3s ease; }
    html.light body { background: linear-gradient(135deg, #FFFCF5, #F4ECE1, #E8D8C8); }
    html.dark body { background: linear-gradient(135deg, #020617, #0f172a, #1e293b); color: #f8fafc; }
    .glass-card { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); transition: all 0.3s ease; }
    html.light .glass-card { background: rgba(255, 255, 255, 0.65); border: 1px solid rgba(255, 255, 255, 0.8); }
    html.dark .glass-card { background: rgba(15, 23, 42, 0.65); border: 1px solid rgba(255, 255, 255, 0.05); }
    .btn-active:active { transform: scale(0.95); }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    
    /* Target Line Marker */
    .target-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(0,0,0,0.2); z-index: 10; }
    html.dark .target-marker { background: rgba(255,255,255,0.2); }
  </style>
</head>

<body class="flex justify-center h-screen overflow-hidden selection:bg-amber-500/30 antialiased relative">

  <div class="w-full max-w-md h-full flex flex-col relative dark:bg-slate-900/50 shadow-2xl ring-1 ring-beige-200 dark:ring-white/5 transition-all">
    
    <header class="pt-10 pb-4 px-6 glass-card rounded-b-3xl z-20 sticky top-0 flex justify-between items-center">
      <div>
        <div class="flex items-center gap-2 mb-1">
          <p class="text-stone-500 dark:text-slate-400 text-xs font-bold uppercase tracking-wider">Dashboard</p>
          <div id="streak-badge" class="hidden items-center gap-1 bg-orange-100/80 dark:bg-orange-500/20 border border-orange-200 text-orange-600 dark:text-orange-400 px-2 py-0.5 rounded-full text-[10px] font-black shadow-sm">
            <i class="fa-solid fa-fire"></i> <span id="streak-count">0</span>
          </div>
        </div>
        <button onclick="switchUser()" class="btn-active group flex items-center gap-2 text-2xl font-black text-stone-800 dark:text-white">
          <span id="name">Kartik</span>
          <i class="fa-solid fa-arrows-rotate text-sm text-amber-600 dark:text-indigo-400 group-hover:rotate-180 transition-transform duration-500"></i>
        </button>
      </div>
      <div class="text-right flex items-center gap-3">
        <div>
          <p class="text-stone-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1">Overall</p>
          <div id="overall" class="text-xl font-bold text-emerald-600 dark:text-emerald-400">--%</div>
        </div>
        <button onclick="openSettings()" class="btn-active w-10 h-10 rounded-full bg-white/80 dark:bg-slate-800/80 border border-beige-300 dark:border-slate-700 shadow-sm flex items-center justify-center text-stone-500 dark:text-slate-400 hover:text-stone-800 dark:hover:text-white transition-colors">
          <i class="fa-solid fa-gear"></i>
        </button>
      </div>
    </header>

    <main id="content" class="flex-1 overflow-y-auto px-5 pt-6 pb-28 space-y-4 relative z-10 scroll-smooth">
      <div class="flex h-full items-center justify-center animate-pulse">
        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-amber-500 dark:text-indigo-500"></i>
      </div>
    </main>

    <nav class="absolute bottom-0 w-full px-4 pb-8 pt-4 glass-card rounded-t-3xl z-20 flex justify-between items-center">
      <button onclick="switchTab('today')" id="tab-today" class="btn-active flex flex-col items-center gap-1 text-amber-700 dark:text-indigo-400 w-14 transition-colors">
        <i class="fa-solid fa-bolt text-xl mb-1"></i><span class="text-[10px] font-bold tracking-wide">Today</span>
      </button>
      <button onclick="switchTab('tracker')" id="tab-tracker" class="btn-active flex flex-col items-center gap-1 text-stone-400 dark:text-slate-500 w-14 transition-colors">
        <i class="fa-solid fa-chart-pie text-xl mb-1"></i><span class="text-[10px] font-bold tracking-wide">Tracker</span>
      </button>
      <button onclick="switchTab('history')" id="tab-history" class="btn-active flex flex-col items-center gap-1 text-stone-400 dark:text-slate-500 w-14 transition-colors">
        <i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i><span class="text-[10px] font-bold tracking-wide">History</span>
      </button>
      <button onclick="switchTab('timetable')" id="tab-timetable" class="btn-active flex flex-col items-center gap-1 text-stone-400 dark:text-slate-500 w-14 transition-colors">
        <i class="fa-solid fa-calendar-days text-xl mb-1"></i><span class="text-[10px] font-bold tracking-wide">Schedule</span>
      </button>
    </nav>
  </div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, initializeFirestore, persistentLocalCache } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyA3R5plHfBl1VU2MOenTYIZJEKRQ0iIcZQ",
  authDomain: "attendance-ea8db.firebaseapp.com",
  projectId: "attendance-ea8db"
});

const db = initializeFirestore(app, { localCache: persistentLocalCache() });

let currentUser = "kartik";
let data = null;
let currentTab = 'today'; 
let myChart = null; 
let lastNudgeTime = 0;

const timetable = {
  Monday: [{sub: "DBMS", time: "8:00", room: "VIB 502"}, {sub: "Java", time: "8:50", room: "VIB 502"}, {sub: "ANN", time: "10:30", room: "VIB 207"}, {sub: "DBMS Lab", time: "11:20", room: "VIB 411"}],
  Tuesday: [{sub: "Java Lab", time: "9:40", room: "VIB 412"}, {sub: "Life Skills", time: "12:05", room: "NYB 005"}],
  Wednesday: [{sub: "DBMS", time: "11:20", room: "NYB 312"}, {sub: "COD", time: "12:05", room: "NYB 312"}],
  Thursday: [{sub: "ANN", time: "8:00", room: "KAB 306"}, {sub: "COD", time: "11:20", room: "NYB 312"}, {sub: "Java", time: "12:05", room: "VIB 016"}],
  Friday: [{sub: "COD", time: "8:00", room: "VIB 307"}, {sub: "Life Skills", time: "8:50", room: "VIB 013"}, {sub: "DBMS", time: "9:40", room: "NYB 312"}, {sub: "ANN", time: "11:20", room: "NYB 312"}, {sub: "Java", time: "12:05", room: "VIB 103"}],
  Saturday: [{sub: "ANN Lab", time: "8:00", room: "VIB 412"}, {sub: "DBMS", time: "9:40", room: "NYB 001"}],
  Sunday: []
};

const allSubjects = [...new Set(Object.values(timetable).flat().map(i => i.sub))];

/* Core Logic Hooks (Restored Today and History Edit) */

window.mark = async function(sub, type) {
  let d = data[currentUser][sub] || {p: 0, t: 0, history: []};
  let actionObj = { type: type, date: new Date().getTime(), id: Math.random().toString(36).substr(2, 9) };
  if(type !== "cancelled") { d.t++; if(type === "present") d.p++; }
  d.history.push(actionObj);
  await setDoc(doc(db, "attendance", "shared"), data);
}

window.deleteEntry = async function(sub, entryId) {
  if(!confirm("Delete this entry? Your stats will re-calculate.")) return;
  let d = data[currentUser][sub];
  let entryIndex = d.history.findIndex(h => h.id === entryId);
  if(entryIndex === -1) return;
  let entry = d.history[entryIndex];
  if(entry.type === "present") { d.p--; d.t--; }
  else if(entry.type === "bunk") { d.t--; }
  d.history.splice(entryIndex, 1);
  await setDoc(doc(db, "attendance", "shared"), data);
}

function render() {
  if(!data) return;
  const stats = calculateStats(data[currentUser]);
  document.getElementById("overall").innerText = `${stats.percent}%`;
  
  let c = document.getElementById("content");
  c.innerHTML = "";
  let delay = 0;

  /* ---- TODAY TAB (RESTORED) ---- */
  if(currentTab === 'today') {
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const todayClasses = timetable[days[new Date().getDay()]];
    c.innerHTML = `<h2 class="text-2xl font-black mb-4">Your Day</h2>`;
    todayClasses.forEach(i => {
      let d = data[currentUser][i.sub] || {p: 0, t: 0, history: []};
      c.innerHTML += `<div class="glass-card rounded-3xl p-5 mb-4 animate-slide-up">
          <div class="flex justify-between items-start mb-4">
            <div><h3 class="text-xl font-bold">${i.sub}</h3><p class="text-stone-500 text-sm mt-1">${i.time} • ${i.room}</p></div>
          </div>
          <div class="grid grid-cols-4 gap-2">
            <button onclick="mark('${i.sub}','present')" class="btn-active bg-emerald-50 text-emerald-600 py-2 rounded-xl text-lg"><i class="fa-solid fa-check"></i></button>
            <button onclick="mark('${i.sub}','bunk')" class="btn-active bg-rose-50 text-rose-600 py-2 rounded-xl text-lg"><i class="fa-solid fa-xmark"></i></button>
            <button onclick="mark('${i.sub}','cancelled')" class="btn-active bg-stone-100 text-stone-500 py-2 rounded-xl text-lg"><i class="fa-solid fa-ban"></i></button>
            <button onclick="switchTab('history')" class="btn-active bg-white text-stone-600 py-2 rounded-xl text-lg border border-beige-200"><i class="fa-solid fa-clock-rotate-left"></i></button>
          </div>
        </div>`;
    });
  }

  /* ---- TRACKER TAB (WITH BUNKABLE CALC & MARKERS) ---- */
  if(currentTab === 'tracker') {
    // Partner and Chart Logic (Same as your Pro snippet)
    // ... 
    allSubjects.forEach(sub => {
      let d = data[currentUser][sub] || {p: 0, t: 0};
      let per = d.t ? ((d.p / d.t) * 100).toFixed(1) : 0;
      let targetNum = data[currentUser].targets?.[sub] || data[currentUser].target || 75;
      
      // Bunkable Calc
      let bunkText = "", bunkColor = "";
      if (parseFloat(per) >= targetNum) {
        let safe = Math.floor((d.p * 100 / targetNum) - d.t);
        bunkText = safe > 0 ? `✅ Safe to bunk: ${safe}` : `⚡ On the edge`;
        bunkColor = "text-emerald-600";
      } else {
        let req = Math.ceil((targetNum * d.t - 100 * d.p) / (100 - targetNum));
        bunkText = `⚠️ Attend next: ${req}`;
        bunkColor = "text-rose-500";
      }

      c.innerHTML += `<div class="glass-card rounded-3xl p-5 mb-4 animate-slide-up relative overflow-hidden">
          <div class="flex justify-between items-start mb-2">
            <div><h3 class="text-lg font-bold">${sub}</h3><span class="text-[10px] font-bold ${bunkColor} uppercase px-2 py-0.5 bg-white/50 dark:bg-black/20 rounded-full border border-current/20">${bunkText}</span></div>
            <div class="text-2xl font-black ${parseFloat(per) < targetNum ? 'text-rose-500' : 'text-emerald-500'}">${per}%</div>
          </div>
          <div class="w-full bg-beige-200 dark:bg-slate-700 rounded-full h-2.5 mb-2 overflow-hidden relative">
            <div class="target-marker" style="left: ${targetNum}%"></div>
            <div class="h-full rounded-full ${parseFloat(per) < targetNum ? 'bg-rose-500' : 'bg-emerald-500'}" style="width: ${per}%"></div>
          </div>
          <div class="flex justify-between text-[10px] font-bold text-stone-400 uppercase"><span>Target: ${targetNum}%</span><span>${d.p} / ${d.t} Classes</span></div>
        </div>`;
    });
  }

  /* ---- HISTORY TAB (WITH DELETE) ---- */
  if(currentTab === 'history') {
    c.innerHTML = `<h2 class="text-xl font-black mb-4">Activity</h2>`;
    stats.history.slice(0, 30).forEach(item => {
      let icon = item.type === 'present' ? 'fa-check text-emerald-500' : item.type === 'bunk' ? 'fa-xmark text-rose-500' : 'fa-ban text-stone-400';
      c.innerHTML += `<div class="flex items-center gap-4 p-3 border-b border-black/5 dark:border-white/5 animate-slide-up">
          <div class="w-10 h-10 rounded-full bg-white/50 flex items-center justify-center"><i class="fa-solid ${icon}"></i></div>
          <div class="flex-1"><p class="font-bold text-sm">${item.sub}</p><p class="text-[10px] text-stone-500">${new Date(item.date).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</p></div>
          <button onclick="deleteEntry('${item.sub}', '${item.id}')" class="text-stone-300 hover:text-rose-500 transition-colors"><i class="fa-solid fa-trash-can text-xs"></i></button>
        </div>`;
    });
  }
}
// ... rest of load engine
</script>
</body>
</html>
