<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance Tracker</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c5364">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.wrapper{
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:900px;
  padding:16px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
}

.top{text-align:center;}

.present{
  background: linear-gradient(135deg,#2ecc71,#27ae60);
}

.bunk{
  background: linear-gradient(135deg,#e74c3c,#c0392b);
}

button{
  margin:6px 0;
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
  width:100%;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
.top-buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}
.present{background:#2ecc71;}
.bunk{background:#e74c3c;}
.switch{background:linear-gradient(135deg,#3498db,#2980b9);}
.track{background:linear-gradient(135deg,#8e44ad,#6c3483);}
.tt{background:linear-gradient(135deg,#f39c12,#d68910);}
.card{
  background: rgba(255,255,255,0.07);
  padding:16px;
  margin:14px 0;
  border-radius:18px;
  line-height:1.6;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.08);
}
.top{
  text-align:center;
  margin-bottom:15px;
}

#overall{
  margin-top:5px;
  opacity:0.9;
}
/* blur */
.done-present{
  background: rgba(46,204,113,0.25);
  backdrop-filter: blur(6px);
}
.done-bunk{
  background: rgba(231,76,60,0.25);
  backdrop-filter: blur(6px);
}
.card b{
  font-size:18px;
  display:block;
  margin-bottom:4px;
}
@media(max-width:600px){

  body{
    font-size:14px;
  }

  h2{
    font-size:20px;
  }

  h3{
    font-size:16px;
  }

  .container{
    padding:12px;
  }

  button{
    font-size:13px;
    padding:10px;
  }

}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<div class="top">
<h2 id="name">Kartik</h2>
<h3 id="overall"></h3>

<div class="top-buttons">
<button class="switch" onclick="switchUser()">Switch 🚶</button>
<button class="track" onclick="toggleMode()">Tracker 📊</button>
<button class="tt" onclick="toggleTT()">Timetable 📅</button>
</div>
</div>

<div id="content">Loading...</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyA3R5plHfBl1VU2MOenTYIZJEKRQ0iIcZQ",
  authDomain:"attendance-ea8db.firebaseapp.com",
  projectId:"attendance-ea8db"
});

const db=getFirestore(app);

let currentUser="kartik";
let data=null;
let timetableMode=false;

/* timetable */
const timetable={
Monday:[
{sub:"DBMS",time:"8:00",room:"VIB 502"},
{sub:"Java",time:"8:50",room:"VIB 502"},
{sub:"ANN",time:"10:30",room:"VIB 207"},
{sub:"DBMS Lab",time:"11:20",room:"VIB 411"}
],
Tuesday:[
{sub:"Java Lab",time:"9:40",room:"VIB 412"},
{sub:"Life Skills",time:"12:05",room:"NYB 005"}
],
Wednesday:[
{sub:"DBMS",time:"11:20",room:"NYB 312"},
{sub:"COD",time:"12:05",room:"NYB 312"}
],
Thursday:[
{sub:"ANN",time:"8:00",room:"KAB 306"},
{sub:"COD",time:"11:20",room:"NYB 312"},
{sub:"Java",time:"12:05",room:"VIB 016"}
],
Friday:[
{sub:"COD",time:"8:00",room:"VIB 307"},
{sub:"Life Skills",time:"8:50",room:"VIB 013"},
{sub:"DBMS",time:"9:40",room:"NYB 312"},
{sub:"ANN",time:"11:20",room:"NYB 312"},
{sub:"Java",time:"12:05",room:"VIB 103"}
],
Saturday:[
{sub:"ANN Lab",time:"8:00",room:"VIB 412"},
{sub:"DBMS",time:"9:40",room:"NYB 001"}
]
};

/* buttons */
window.switchUser=function(){
  currentUser=currentUser==="kartik"?"tara":"kartik";
  document.getElementById("name").innerText=currentUser==="kartik"?"Kartik":"Tara";
  render();
}

window.toggleMode=function(){
  timetableMode=false;
  render();
}

window.toggleTT=function(){
  timetableMode=!timetableMode;
  render();
}

/* mark */
window.mark=async function(sub,type){
  let d=data[currentUser][sub]||{p:0,t:0,history:[]};

  d.t++;
  if(type==="present") d.p++;

  if(!d.history) d.history=[];
  d.history.push(type);

  data[currentUser][sub]=d;

  await setDoc(doc(db,"attendance","shared"),data);
  render();
}

/* undo */
window.undo=async function(sub){
  let d=data[currentUser][sub];
  if(!d || !d.history || d.history.length===0) return;

  let last=d.history.pop();

  if(last==="present"){
    d.p--;
    d.t--;
  }else{
    d.t--;
  }

  await setDoc(doc(db,"attendance","shared"),data);
  render();
}

/* calc */
function overall(){
  let u=data[currentUser];
  let p=0,t=0;
  Object.values(u).forEach(s=>{p+=s.p;t+=s.t});
  return ((p/t)*100).toFixed(2);
}

function calcBunk(p,t){
  let x=Math.floor((p/0.75)-t);
  return x>0?x:0;
}

function need75(p,t){
  let x=Math.ceil((0.75*t-p)/0.25);
  return x>0?x:0;
}

/* render */
function render(){

if(!data) return;

document.getElementById("overall").innerText="📊 "+overall()+"%";

let c=document.getElementById("content");
c.innerHTML="";

/* timetable */
if(timetableMode){
  Object.keys(timetable).forEach(day=>{
    c.innerHTML+=`<h3>${day}</h3>`;
    timetable[day].forEach(i=>{
      c.innerHTML+=`
      <div class="card">
      <b>${i.sub}</b><br>
      ⏰ ${i.time}<br>
      📍 ${i.room}
      </div>`;
    });
  });
  return;
}

/* tracker */
let subjects={};

Object.keys(timetable).forEach(day=>{
  timetable[day].forEach(i=>{
    subjects[i.sub]=i;
  });
});

Object.values(subjects).forEach(i=>{
  let d=data[currentUser][i.sub]||{p:0,t:0,history:[]};
  let per=d.t?((d.p/d.t)*100).toFixed(1):0;

  let cls="card";
  let last=d.history?.[d.history.length-1];

  if(last==="present") cls+=" done-present";
  if(last==="bunk") cls+=" done-bunk";

  c.innerHTML+=`
  <div class="${cls}">
  <b>${i.sub}</b><br>
  📍 ${i.room}<br>
  ${per}% (${d.p}/${d.t})<br>

  <div>😎 Can bunk: ${calcBunk(d.p,d.t)}</div>
  <div>📈 Need for 75%: ${need75(d.p,d.t)}</div>

<div style="display:flex; flex-direction:column; gap:8px; margin-top:10px;">
    <button class="present" onclick="mark('${i.sub}','present')">➕</button>
    <button class="bunk" onclick="mark('${i.sub}','bunk')">❌</button>
    <button style="background:#555;" onclick="undo('${i.sub}')">➖</button>
  </div>
  </div>`;
});

}

/* load */
async function load(){
  let snap=await getDoc(doc(db,"attendance","shared"));
  if(snap.exists()){
    data=snap.data();
    render();
  }
}

load();
</script>

</body>
</html>
